      min-height: 100vh;
    }
    .font-display { font-family: 'Hi Melody', cursive; }

    @keyframes wheel-pulse {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.04) rotate(2deg); }
    }
    .wheel-idle { animation: wheel-pulse 3s ease-in-out infinite; }

    @keyframes spin-slow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    @keyframes hint-glow {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.85), 0 10px 30px rgba(255, 152, 0, 0.4);
        transform: scale(1.15);
      }
      50% {
        box-shadow: 0 0 0 24px rgba(255, 193, 7, 0), 0 10px 30px rgba(255, 152, 0, 0.4);
        transform: scale(1.22);
      }
    }
    .hint {
      animation: hint-glow 1.1s ease-in-out infinite;
      background: linear-gradient(135deg, #FFEB3B 0%, #FFC107 100%) !important;
      font-size: 130% !important;
      font-weight: 900;
      z-index: 10;
      position: relative;
    }

    @keyframes pop-in {
      0% { transform: scale(0.4) translateY(20px); opacity: 0; }
      60% { transform: scale(1.08) translateY(-4px); }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .pop-in { animation: pop-in 0.55s cubic-bezier(0.34, 1.56, 0.64, 1); }

    @keyframes shake-x {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-14px); }
      40% { transform: translateX(14px); }
      60% { transform: translateX(-10px); }
      80% { transform: translateX(10px); }
    }
    .shake { animation: shake-x 0.5s ease-in-out; }

    @keyframes confetti-fall {
      0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti {
      position: fixed;
      top: 0;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      animation: confetti-fall 3.5s linear forwards;
      pointer-events: none;
      z-index: 50;
    }

    .color-btn {
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }
    .color-btn:not(:disabled):hover {
      transform: translateY(-14px) scale(1.08) rotate(-3deg);
      filter: brightness(1.05);
    }
    .color-btn:disabled { opacity: 0.2; filter: grayscale(0.7); cursor: not-allowed; }

      transition: all 0.25s ease;

    .option-btn:not(:disabled):hover {

      filter: blur(40px);
      opacity: 0.35;

      if (!word) return true;
      const ch = word[word.length - 1];
      const code = ch.charCodeAt(0);
      if (code >= 0xAC00 && code <= 0xD7A3) {
        return (code - 0xAC00) % 28 !== 0;
      }
      // 한글 외 (숫자 끝나는 "1층", "2반" 등) — 받침 있다고 가정
      // 다만 받침 없는 한자/특수 케이스 별로 추가 처리 가능
      return true;
    }

    function fillSentence(template, option) {
      const coda = hasCoda(option);
      let result = template.replace(/___/g, option);

      // 옵션 직후의 조사를 자동 수정
      const replaceJosa = (afterPattern, withCoda, withoutCoda) => {
        const re = new RegExp(escapeRegex(option) + afterPattern, 'g');
        result = result.replace(re, option + (coda ? withCoda : withoutCoda));
      };

      // 슬래시형 표기 우선 처리
      replaceJosa('을/를', '을', '를');
      replaceJosa('이/가', '이', '가');
      replaceJosa('은/는', '은', '는');
      replaceJosa('으로/로', '으로', '로');
      replaceJosa('와/과', '과', '와');

      // 단일 표기 자동 보정
      if (coda) {
        replaceJosa('를(?![/가-힣])', '을', '을');
        replaceJosa('가(?![/가-힣])', '이', '이');
        replaceJosa('는(?![/가-힣])', '은', '은');
      } else {
        replaceJosa('을(?![/가-힣])', '를', '를');
        replaceJosa('이(?![/가-힣가])', '가', '가');
        replaceJosa('은(?![/가-힣])', '는', '는');
      }

      // 이에요 / 예요
      const ieyo = new RegExp(escapeRegex(option) + '이에요', 'g');
      const yeyo = new RegExp(escapeRegex(option) + '예요', 'g');
      result = result.replace(ieyo, option + (coda ? '이에요' : '예요'));
      result = result.replace(yeyo, option + (coda ? '이에요' : '예요'));

      return result;
    }

    function escapeRegex(s) {
      return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // ───────────────────────── TTS ─────────────────────────
    function speak(text, opts = {}) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const clean = text
        .replace(/\p{Extended_Pictographic}/gu, '')  // 이모지 제거
        .replace(/[~∼〜～…·•◦‣⁃\-–—_*#^|<>]/g, ' ')   // TTS가 읽어버리는 기호 제거
        .replace(/\s+/g, ' ')
        .trim();
      const u = new SpeechSynthesisUtterance(clean);
      u.lang = 'ko-KR';
      u.rate = opts.rate ?? 0.9;
      u.pitch = opts.pitch ?? 1.1;
      u.volume = 1;
      window.speechSynthesis.speak(u);
    }

    // ───────────────────────── 효과음 (Web Audio API 합성) ─────────────────────────
    let _audioCtx = null;
    function getAudioCtx() {
      if (!_audioCtx) {
        try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch (e) { return null; }
      }
      return _audioCtx;
    }

    // 도-미-솔 빠른 아르페지오 (발랄한 팝)
    function playPop() {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const now = ctx.currentTime;
      [523.25, 659.25, 783.99].forEach((f, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine';
        o.frequency.value = f;
        g.gain.setValueAtTime(0.18, now + i * 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.04 + 0.2);
        o.start(now + i * 0.04);
        o.stop(now + i * 0.04 + 0.22);
      });
    }

    // 낮은 톤 하강 (오답)
    function playWrong() {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const now = ctx.currentTime;
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'triangle';
      o.frequency.setValueAtTime(280, now);
      o.frequency.exponentialRampToValueAtTime(140, now + 0.25);
      g.gain.setValueAtTime(0.15, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
      o.start(now);
      o.stop(now + 0.32);
    }

    // 도-미-솔-도 상승 아르페지오 (10턴 완료)
    function playSuccess() {
      const ctx = getAudioCtx();
      if (!ctx) return;
      const now = ctx.currentTime;
      [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine';
        o.frequency.value = f;
        g.gain.setValueAtTime(0.22, now + i * 0.09);
        g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.09 + 0.35);
        o.start(now + i * 0.09);
        o.stop(now + i * 0.09 + 0.37);
      });
    }

    // ───────────────────────── App ─────────────────────────
    function App() {
      const [phase, setPhase] = useState('start');
      const [turnIndex, setTurnIndex] = useState(0);
      const [currentQ, setCurrentQ] = useState(null);  // 현재 출제된 문제 (옵션 절단·셔플 적용된 상태)
      const [collected, setCollected] = useState([]);
      const [usedIds, setUsedIds] = useState([]);
      const [showHint, setShowHint] = useState(false);
      const [wrongShake, setWrongShake] = useState(false);
      const [listening, setListening] = useState(false);
      const [pendingRecord, setPendingRecord] = useState(null);

      // 글로벌 버튼 클릭 사운드 (옵션 버튼은 data-no-pop으로 제외)
      useEffect(() => {
        function handleClick(e) {
          const btn = e.target.closest('button');
          if (btn && !btn.disabled && !btn.hasAttribute('data-no-pop')) {
            playPop();
          }
        }
        document.addEventListener('click', handleClick);
        return () => document.removeEventListener('click', handleClick);
      }, []);

      // 현재 차례 학생 정보
      const currentStudent = useMemo(() => {
        if (turnIndex >= STUDENT_ORDER.length) return null;
        const name = STUDENT_ORDER[turnIndex];
        return STUDENTS.find(s => s.name === name);
      }, [turnIndex]);

      // 차례가 바뀌면 발랄하게 안내 (색깔 고르기 화면 진입 시)
      const ORDINAL = ['첫', '두', '세', '네', '다섯', '여섯', '일곱', '여덟', '아홉', '열'];
      useEffect(() => {
        if (phase !== 'playing' || !currentStudent || currentQ || listening) return;
        const studentRound = STUDENT_ORDER
          .slice(0, turnIndex + 1)
          .filter(n => n === currentStudent.name).length;
        const ord = ORDINAL[turnIndex] || (turnIndex + 1);
        const t = setTimeout(() => {
          speak(`자~ ${ord} 번째, ${currentStudent.name} 친구 차례예요!`, { pitch: 1.25, rate: 0.95 });
        }, 350);
        return () => clearTimeout(t);
      }, [turnIndex, phase, currentQ, listening, currentStudent]);

      // 색깔별 남은 문제 수
      function remainingInCategory(color) {
        const cat = COLOR_MAP[color].cat;
        const pool = QUIZ_POOL[cat] || [];
        return pool.filter(q => {
          if (usedIds.includes(q.id)) return false;
          if (cat === '친구' && currentStudent && q.target === currentStudent.name) return false;
          return true;
        }).length;
      }
      const colorAvailable = (color) => remainingInCategory(color) > 0;

      // 색깔 클릭
      function handleColorClick(color) {
        if (currentQ || listening || !currentStudent) return;
        const cat = COLOR_MAP[color].cat;
        const pool = QUIZ_POOL[cat] || [];
        const candidates = pool.filter(q => {
          if (usedIds.includes(q.id)) return false;
          if (cat === '친구' && q.target === currentStudent.name) return false;
          return true;
        });
        if (candidates.length === 0) return;

        const picked = candidates[Math.floor(Math.random() * candidates.length)];
        const level = currentStudent.level;
        const count = level === '가' ? 5 : level === '나' ? 3 : 1;

        // 정답(=options[0]) 포함 앞 N개
        const sliced = picked.options.slice(0, count);
        // 1지선다 제외하고 셔플
        const displayOptions = count > 1 ? shuffle(sliced) : sliced;

        setCurrentQ({
          ...picked,
          color,
          category: cat,
          displayOptions,
          answer: picked.is_open ? null : picked.options[0]
        });
        setShowHint(false);
        setWrongShake(false);

        // 색깔 선택 즉시 피드백 + 문제 본문 읽기 (이모지는 speak()에서 자동 제거)
        const catPhrase = {
          '친구':   '친구 문제를 골랐네요! 친구 문제 보여줄게요.',
          '선생님': '선생님 문제를 골랐네요! 선생님 문제 보여줄게요.',
          '일상':   '일상 문제를 골랐네요! 일상 문제 보여줄게요.',
          '학교':   '학교 문제를 골랐네요! 학교 문제 보여줄게요.'
        }[cat] || '문제를 보여줄게요.';
        setTimeout(() => {
          speak(`${catPhrase} ${picked.question}`);
        }, 200);
      }

      // 선택지 클릭
      function handleOptionClick(opt) {
        if (!currentQ || listening) return;

        // fixed 오답 처리
        if (!currentQ.is_open && opt !== currentQ.answer) {
          playWrong();
          setShowHint(true);
          setWrongShake(true);
          speak('다시 한 번 골라볼까요? 반짝이는 답을 골라보세요.');
          setTimeout(() => setWrongShake(false), 600);
          return;
        }

        // 정답 또는 open → 듣기 단계
        playPop();
        const sentence = fillSentence(currentQ.sentence_template, opt);
        const record = {
          id: currentQ.id,
          color: currentQ.color,
          category: currentQ.category,
          asked_to: currentStudent.name,
          target: currentQ.target || '학급 공통',
          level: currentStudent.level,
          keyword: opt,
          sentence: sentence
        };

        setPendingRecord(record);
        setListening(true);
        setShowHint(false);
        setTimeout(() => {
          if (record.level === '나') speak(record.keyword);
          else speak(record.sentence);
        }, 400);
      }

      function handleReplay() {
        if (!pendingRecord) return;
        if (pendingRecord.level === '나') speak(pendingRecord.keyword);
        else speak(pendingRecord.sentence);
      }

      function handleListeningDone() {
        if (!pendingRecord) return;
        const newCollected = [...collected, pendingRecord];
        const newUsedIds = [...usedIds, pendingRecord.id];
        const newTurn = turnIndex + 1;

        setCollected(newCollected);
        setUsedIds(newUsedIds);
        setCurrentQ(null);
        setListening(false);
        setPendingRecord(null);
        setTurnIndex(newTurn);

        if (newCollected.length === 10) {
          localStorage.setItem('collectedKeywords', JSON.stringify(newCollected));
          setPhase('complete');
        }
      }

      function goFlowchart() {
        setPhase('flowchart');
      }

      function goPractice() {
        setPhase('practice');
      }

      function startGame() {
        setPhase('playing');
        setTurnIndex(0);
        setCollected([]);
        setUsedIds([]);
        setCurrentQ(null);
        setListening(false);
        setPendingRecord(null);
        setShowHint(false);
      }

      function goActivity2() {
        window.location.href = 'activity2.html';
      }

      function restart() {
        if (!confirm('처음부터 다시 시작할까요? (모은 핵심어가 사라져요)')) return;
        localStorage.removeItem('collectedKeywords');
        startGame();
      }

      if (phase === 'start')     return <StartScreen onShowFlow={goFlowchart} onPractice={goPractice} />;
      if (phase === 'flowchart') return <FlowchartScreen onStart={startGame} onPractice={goPractice} />;
      if (phase === 'practice')  return <PracticeScreen onBack={() => setPhase('start')} onStart={startGame} />;
      if (phase === 'complete')  return <CompleteScreen collected={collected} onGo={goActivity2} onRestart={restart} />;

      return (
        <PlayingScreen
          collected={collected}
          currentQ={currentQ}
          currentStudent={currentStudent}
          turnIndex={turnIndex}
          colorAvailable={colorAvailable}
          onColorClick={handleColorClick}
          onOptionClick={handleOptionClick}
          showHint={showHint}
          wrongShake={wrongShake}
          listening={listening}
          pendingRecord={pendingRecord}
          onReplay={handleReplay}
          onListeningDone={handleListeningDone}
          onRestart={restart}
        />
      );
    }

    // ───────────────────────── 시작 화면 ─────────────────────────
    function StartScreen({ onShowFlow, onPractice }) {
      useEffect(() => {
        // 진입 시 발랄한 효과음 + 인트로 멘트
        setTimeout(() => playSuccess(), 300);
        setTimeout(() => {
          speak('우리 반 테마곡 만들기를 시작해요! 우리 다 같이 순서대로 진행해 봐요!', { pitch: 1.2, rate: 0.95 });
        }, 700);
      }, []);

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-12 relative overflow-hidden">
          <div className="deco-circle" style={{ background: 'var(--pink)',    width: 400, height: 400, top: '-100px',  left: '-100px' }} />
          <div className="deco-circle" style={{ background: 'var(--yellow)',  width: 350, height: 350, bottom: '-80px', right: '-80px' }} />
          <div className="deco-circle" style={{ background: 'var(--skyblue)', width: 300, height: 300, top: '40%',      right: '5%' }} />

          <h1 className="font-display text-[140px] leading-none mb-2 pop-in" style={{
            background: 'linear-gradient(135deg, #F48FB1 0%, #FFB74D 50%, #4FC3F7 100%)',
            WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
            filter: 'drop-shadow(0 4px 0 rgba(0,0,0,0.05))'
          }}>
            우리 반 테마곡
          </h1>
          <h2 className="text-5xl mb-16 text-gray-600 pop-in" style={{ animationDelay: '0.15s' }}>
            🎵 핵심어 모으기 게임 🎵
          </h2>

          <div className="flex gap-6 mb-20">
            {STUDENTS.map((s, i) => (
              <div
                key={s.name}
                className="bg-white/90 backdrop-blur rounded-3xl p-8 shadow-xl text-center pop-in"
                style={{ animationDelay: `${0.3 + i * 0.1}s` }}
              >
                <div className="text-8xl mb-2">{s.emoji}</div>
                <div className="text-4xl font-bold">{s.name}</div>
              </div>
            ))}
          </div>

          <div className="flex gap-6 pop-in" style={{ animationDelay: '0.9s' }}>
            <button
              onClick={onPractice}
              className="text-white text-5xl font-bold px-14 py-7 rounded-full shadow-2xl transition-all hover:scale-110 hover:-rotate-1"
              style={{ background: 'linear-gradient(135deg, #4FC3F7 0%, #29B6F6 100%)' }}
            >
              🎯 연습하기
            </button>
            <button
              onClick={onShowFlow}
              className="text-white text-5xl font-bold px-14 py-7 rounded-full shadow-2xl transition-all hover:scale-110 hover:rotate-1"
              style={{ background: 'linear-gradient(135deg, #F48FB1 0%, #FFB74D 100%)' }}
            >
              📋 순서도 보기
            </button>
          </div>
        </div>
      );
    }

    // ───────────────────────── 순서도 화면 (학생 차례 순환도) ─────────────────────────
    function FlowchartScreen({ onStart, onPractice }) {
      // 한 바퀴 = 5명. 마지막 뒤에 다시 첫 주자로 순환.
      const order = STUDENT_ORDER.slice(0, 5).map(name => STUDENTS.find(s => s.name === name));

      useEffect(() => {
        setTimeout(() => playPop(), 200);
        setTimeout(() => {
          const names = order.map(s => s.name).join(', ');
          speak(`우리 차례를 알려줄게요! ${names} 순서로 돌아가요. 마지막 친구가 끝나면 다시 첫 번째 친구 차례로 돌아와요. 자, 첫 번째 김현민 친구부터 시작할까요?`, { pitch: 1.15, rate: 0.95 });
        }, 500);
      }, []);

      const cx = 360, cy = 360, R = 250;
      const n = order.length;
      const nodeAngle = (i) => (i / n) * 2 * Math.PI - Math.PI / 2; // 12시 방향부터 시계방향
      const pt = (angle, r = R) => [cx + r * Math.cos(angle), cy + r * Math.sin(angle)];

      // 두 노드 사이를 잇는 원호 path + 끝점 화살표 각도
      const arc = (i) => {
        const gap = 0.32; // 노드 주변 여백(라디안)
        const a1 = nodeAngle(i) + gap;
        const a2 = nodeAngle((i + 1) % n) - gap;
        const rArc = R; // 화살표가 도는 반지름
        const [x1, y1] = pt(a1, rArc);
        const [x2, y2] = pt(a2, rArc);
        // 화살표 머리 각도: 원 접선 방향(시계방향 진행) = 반경각 + 90°
        const headDeg = (a2 * 180 / Math.PI) + 90;
        return { d: `M ${x1} ${y1} A ${rArc} ${rArc} 0 0 1 ${x2} ${y2}`, hx: x2, hy: y2, headDeg };
      };

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-8 relative overflow-hidden">
          <div className="deco-circle" style={{ background: 'var(--pink)',    width: 350, height: 350, top: '-80px',  right: '-80px' }} />
          <div className="deco-circle" style={{ background: 'var(--skyblue)', width: 300, height: 300, bottom: '-60px', left: '-60px' }} />

          <h1 className="font-display text-7xl mb-2 pop-in" style={{
            background: 'linear-gradient(135deg, #F48FB1, #FFB74D, #4FC3F7)',
            WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
          }}>
            우리 차례는 이렇게!
          </h1>
          <p className="text-3xl text-gray-500 mb-2 pop-in" style={{ animationDelay: '0.15s' }}>
            🔄 한 명씩 돌아가며, 마지막 친구 다음엔 다시 처음으로!
          </p>

          <div className="relative" style={{ width: 720, height: 720 }}>
            {/* 순환 화살표 (SVG path + 끝점 화살촉) */}
            <svg width="720" height="720" className="absolute inset-0 pointer-events-none">
              {order.map((_, i) => {
                const { d, hx, hy, headDeg } = arc(i);
                const isFirst = i === n - 1; // 마지막→처음 으로 돌아가는 화살표
                const stroke = isFirst ? '#F48FB1' : '#FFC107';
                return (
                  <g key={i}>
                    <path d={d} fill="none" stroke={stroke} strokeWidth="6"
                      strokeDasharray="2 14" strokeLinecap="round" opacity="0.85" />
                    <g transform={`translate(${hx} ${hy}) rotate(${headDeg})`}>
                      <path d="M 0 0 L -16 -9 L -16 9 Z" fill={stroke} />
                    </g>
                  </g>
                );
              })}
            </svg>

            {/* 중앙 */}
            <div className="absolute flex flex-col items-center justify-center rounded-full shadow-2xl"
              style={{
                left: cx - 105, top: cy - 105, width: 210, height: 210,
                background: 'linear-gradient(135deg, #FFFDE7, #FFE0B2)',
                border: '8px solid white'
              }}>
              <div className="text-6xl">🔄</div>
              <div className="text-3xl font-black text-gray-700 mt-1">우리 반</div>
              <div className="text-xl font-bold text-gray-500">5명 순서대로</div>
            </div>

            {/* 학생 노드 */}
            {order.map((s, i) => {
              const [x, y] = pt(nodeAngle(i));
              const isFirst = i === 0;
              return (
                <div
                  key={s.name}
                  className="absolute flex flex-col items-center justify-center rounded-3xl shadow-xl pop-in"
                  style={{
                    left: x - 90, top: y - 90, width: 180, height: 180,
                    background: isFirst ? 'linear-gradient(135deg, #FFE082, #FFAB91)' : 'white',
                    border: `6px solid ${isFirst ? '#FF7043' : '#FFD54F'}`,
                    animationDelay: `${0.3 + i * 0.15}s`,
                    transform: isFirst ? 'scale(1.08)' : 'none',
                    zIndex: isFirst ? 5 : 1
                  }}
                >
                  <div className="absolute -top-6 -left-4 rounded-full flex items-center justify-center text-3xl font-black text-white shadow-lg"
                    style={{ width: 56, height: 56, background: isFirst ? '#FF7043' : '#FFB300' }}>
                    {i + 1}
                  </div>
                  <div className="text-7xl">{s.emoji}</div>
                  <div className="text-3xl font-black text-gray-800 mt-1">{s.name}</div>
                  {isFirst && (
                    <div className="absolute -bottom-7 px-4 py-1 rounded-full text-white text-xl font-bold shadow-lg whitespace-nowrap"
                      style={{ background: '#FF7043' }}>
                      👈 여기서 시작!
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          <div className="flex gap-5 mt-6 pop-in" style={{ animationDelay: '1.2s' }}>
            <button
              onClick={onPractice}
              className="text-white text-5xl font-bold px-12 py-6 rounded-full shadow-2xl transition-all hover:scale-110 hover:-rotate-1"
              style={{ background: 'linear-gradient(135deg, #4FC3F7 0%, #29B6F6 100%)' }}
            >
              🎯 먼저 연습
            </button>
            <button
              onClick={onStart}
              className="text-white text-6xl font-bold px-16 py-6 rounded-full shadow-2xl transition-all hover:scale-110 hover:rotate-1"
              style={{ background: 'linear-gradient(135deg, #66BB6A 0%, #43A047 100%)' }}
            >
              ▶️ 시작하기
            </button>
          </div>
        </div>
      );
    }

    // ───────────────────────── 연습(시범) 화면 ─────────────────────────
    function PracticeScreen({ onBack, onStart }) {
      // step: 'intro'(색깔 고르기) → 'question'(문제) → 'done'(칭찬)
      const [step, setStep] = useState('intro');
      const [showHint, setShowHint] = useState(false);
      const [wrongShake, setWrongShake] = useState(false);

      // 연습 전용 문제 (본 게임 풀과 무관, 3지선다)
      const PRACTICE_Q = {
        color: 'skyblue',
        category: '학교',
        question: '우리는 몇 학년일까요? 🏫',
        answer: '3학년',
        options: ['1학년', '2학년', '3학년']  // 화면 표시 순서 그대로
      };

      useEffect(() => {
        setTimeout(() => playPop(), 200);
        setTimeout(() => {
          speak('먼저 어떻게 하는지 연습해 볼까요? 돌림판을 돌리고, 나온 색깔을 눌러보세요!', { pitch: 1.15, rate: 0.95 });
        }, 500);
      }, []);

      function handleColor() {
        playPop();
        setStep('question');
        setTimeout(() => {
          speak(`학교 문제를 골랐네요! ${PRACTICE_Q.question}`);
        }, 250);
      }

      function handleOption(opt) {
        if (opt !== PRACTICE_Q.answer) {
          playWrong();
          setShowHint(true);
          setWrongShake(true);
          speak('다시 한 번 골라볼까요? 반짝이는 답을 골라보세요.');
          setTimeout(() => setWrongShake(false), 600);
          return;
        }
        playPop();
        setStep('done');
        setTimeout(() => {
          speak('정답이에요! 정말 잘했어요! 이제 진짜로 시작해 볼까요?', { pitch: 1.25, rate: 0.95 });
        }, 300);
      }

      const info = COLOR_MAP[PRACTICE_Q.color];

      return (
        <div className="min-h-screen flex flex-col p-8 relative overflow-hidden">
          {/* 상단: 연습 모드 배지 */}
          <div className="flex justify-between items-center mb-4">
            <div className="rounded-full px-8 py-3 text-3xl font-black text-white shadow-lg"
              style={{ background: 'linear-gradient(135deg, #4FC3F7, #29B6F6)' }}>
              🎯 연습 시간
            </div>
            <button
              onClick={onBack}
              className="bg-white/80 hover:bg-white rounded-full px-6 py-3 text-2xl font-bold shadow"
            >
              ← 처음으로
            </button>
          </div>

          <div className="flex-1 flex items-center justify-center">
            {step === 'intro' && (
              <div className="flex flex-col items-center">
                <div className="text-5xl mb-3 text-gray-700 font-black">🎡 연습해 볼까요?</div>
                <div className="text-3xl mb-10 text-gray-500">
                  돌림판을 돌리고 나온 색깔을 눌러요! (연습은 하늘색이에요)
                </div>
                <div className="grid grid-cols-2 gap-10">
                  {Object.entries(COLOR_MAP).map(([key, ci]) => {
                    const isPractice = key === 'skyblue';
                    return (
                      <button
                        key={key}
                        disabled={!isPractice}
                        onClick={handleColor}
                        data-no-pop
                        className={`color-btn rounded-full flex flex-col items-center justify-center ${isPractice ? 'wheel-idle' : ''}`}
                        style={{
                          background: `radial-gradient(circle at 30% 30%, ${ci.hex} 0%, ${ci.deep} 100%)`,
                          width: 240, height: 240,
                          border: '8px solid white',
                          boxShadow: isPractice ? '0 10px 25px rgba(0,0,0,0.15)' : 'none',
                          opacity: isPractice ? 1 : 0.25,
                          filter: isPractice ? 'none' : 'grayscale(0.6)',
                          cursor: isPractice ? 'pointer' : 'not-allowed'
                        }}
                      >
                        <div className="text-7xl mb-2 drop-shadow-md">{ci.emoji}</div>
                        <div className="text-4xl font-black text-white drop-shadow-md">{ci.label}</div>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {step === 'question' && (
              <div className={`w-full max-w-7xl ${wrongShake ? 'shake' : 'pop-in'}`}>
                <div className="bg-white rounded-[40px] shadow-2xl p-12" style={{ border: `8px solid ${info.hex}` }}>
                  <div className="flex items-center justify-center gap-3 mb-4">
                    <span className="text-3xl" style={{ background: info.chipBg, padding: '6px 20px', borderRadius: '999px' }}>
                      {info.emoji} {info.label}
                    </span>
                    <span className="text-3xl font-bold text-gray-500">· 연습 문제</span>
                  </div>
                  <div className="text-7xl font-black text-center mb-10 mt-6 leading-tight">
                    {PRACTICE_Q.question}
                  </div>
                  <div className="grid grid-cols-3 gap-5">
                    {PRACTICE_Q.options.map((opt, idx) => {
                      const isAnswer = opt === PRACTICE_Q.answer;
                      const isHighlight = showHint && isAnswer;
                      return (
                        <button
                          key={idx}
                          data-no-pop
                          onClick={() => handleOption(opt)}
                          className={`option-btn rounded-3xl py-8 px-3 text-4xl font-black shadow-lg leading-tight ${isHighlight ? 'hint' : ''}`}
                          style={isHighlight ? {} : {
                            background: 'linear-gradient(135deg, #FFFDE7 0%, #FFE0B2 100%)',
                            color: '#5D4037'
                          }}
                        >
                          {opt}
                        </button>
                      );
                    })}
                  </div>
                  {showHint && (
                    <div className="text-center text-4xl mt-8 font-bold text-amber-700 pop-in">
                      ✨ 반짝반짝 빛나는 답을 골라볼까요?
                    </div>
                  )}
                </div>
              </div>
            )}

            {step === 'done' && (
              <div className="flex flex-col items-center pop-in">
                <div className="text-[160px] mb-2">🎉</div>
                <div className="font-display text-8xl mb-4" style={{
                  background: 'linear-gradient(135deg, #66BB6A, #43A047)',
                  WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
                }}>
                  정답! 잘했어요!
                </div>
                <div className="text-3xl text-gray-600 mb-12">
                  이렇게 하면 돼요. 이제 진짜로 시작해 볼까요?
                </div>
                <div className="flex gap-6">
                  <button
                    onClick={onBack}
                    className="bg-white text-gray-700 text-3xl font-bold px-10 py-6 rounded-full shadow-xl hover:scale-105 transition"
                  >
                    🔄 한 번 더 연습
                  </button>
                  <button
                    onClick={onStart}
                    className="text-white text-4xl font-bold px-14 py-6 rounded-full shadow-2xl hover:scale-110 transition"
                    style={{ background: 'linear-gradient(135deg, #F48FB1 0%, #FFB74D 100%)' }}
                  >
                    ▶️ 진짜로 시작하기
                  </button>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ───────────────────────── 플레이 화면 ─────────────────────────
    function PlayingScreen({
      collected, currentQ, currentStudent, turnIndex, colorAvailable,
      onColorClick, onOptionClick, showHint, wrongShake,
      listening, pendingRecord, onReplay, onListeningDone, onRestart
    }) {
      // 학생별 현재 라운드 (1차/2차)
      const studentTurnNumber = STUDENT_ORDER
        .slice(0, turnIndex + 1)
        .filter(n => n === currentStudent?.name).length;

      return (
        <div className="min-h-screen flex flex-col p-8">
          <header className="flex justify-between items-center mb-6">
            <div className="font-display text-6xl" style={{
              background: 'linear-gradient(135deg, #F48FB1, #FFB74D)',
              WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
            }}>
              🎵 핵심어 모으기
            </div>
            <div className="flex items-center gap-4">
              <div className="bg-white rounded-full px-10 py-4 shadow-xl text-4xl font-bold">
                {collected.length} <span className="text-gray-400">/</span> 10
              </div>
              <button
                onClick={onRestart}
                className="bg-white/80 hover:bg-white rounded-full px-5 py-3 text-xl shadow"
                title="처음부터 다시 시작"
              >
                🔄
              </button>
            </div>
          </header>

          <TurnRow currentStudent={currentStudent?.name} active={!currentQ && !listening} />

          <div className="flex-1 flex items-center justify-center my-6">
            {listening && pendingRecord ? (
              <ListeningScreen
                record={pendingRecord}
                onReplay={onReplay}
                onDone={onListeningDone}
              />
            ) : !currentQ ? (
              <ColorPicker
                onPick={onColorClick}
                colorAvailable={colorAvailable}
                currentStudent={currentStudent}
                studentTurnNumber={studentTurnNumber}
              />
            ) : (
              <QuestionCard
                question={currentQ}
                onSelect={onOptionClick}
                showHint={showHint}
                wrongShake={wrongShake}
                studentName={currentStudent?.name}
              />
            )}
          </div>

          <CollectedBar collected={collected} />
        </div>
      );
    }

    function TurnRow({ currentStudent, active }) {
      return (
        <div className="flex justify-center gap-5">
          {STUDENTS.map(s => {
            const isMe = s.name === currentStudent;
            return (
              <div
                key={s.name}
                className={`rounded-3xl px-6 py-4 transition-all duration-300 ${
                  isMe && active ? 'student-active' :
                  isMe ? 'bg-white shadow-lg' :
                  'bg-white/60 opacity-50'
                }`}
              >
                <div className="text-5xl text-center">{s.emoji}</div>
                <div className="text-2xl text-center font-bold mt-1">{s.name}</div>
                {isMe && active && (
                  <div className="text-lg text-center mt-1 font-bold text-amber-700">👈 차례</div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    function ColorPicker({ onPick, colorAvailable, currentStudent, studentTurnNumber }) {
      return (
        <div className="flex flex-col items-center">
          <div className="text-6xl mb-4 text-gray-700 font-black">
            🎡 {currentStudent?.name}의 {studentTurnNumber}번째 차례!
          </div>
          <div className="text-3xl mb-10 text-gray-500">
            돌림판을 돌리고 나온 색깔을 눌러요!
          </div>
          <div className="grid grid-cols-2 gap-10">
            {Object.entries(COLOR_MAP).map(([key, info]) => {
              const ok = colorAvailable(key);
              return (
                <button
                  key={key}
                  disabled={!ok}
                  onClick={() => onPick(key)}
                  className={`color-btn rounded-full flex flex-col items-center justify-center ${ok ? 'wheel-idle' : ''}`}
                  style={{
                    background: `radial-gradient(circle at 30% 30%, ${info.hex} 0%, ${info.deep} 100%)`,
                    width: 260, height: 260,
                    border: '8px solid white',
                    boxShadow: ok ? '0 10px 25px rgba(0,0,0,0.15)' : 'none'
                  }}
                >
                  <div className="text-7xl mb-2 drop-shadow-md">{info.emoji}</div>
                  <div className="text-4xl font-black text-white drop-shadow-md">{info.label}</div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function QuestionCard({ question, onSelect, showHint, wrongShake, studentName }) {
      const count = question.displayOptions.length;
      const cols = count === 1 ? 'grid-cols-1 max-w-md mx-auto'
                 : count === 3 ? 'grid-cols-3'
                 : 'grid-cols-5';

      const colorInfo = COLOR_MAP[question.color];

      return (
        <div className={`w-full max-w-7xl ${wrongShake ? 'shake' : 'pop-in'}`}>
          <div className="bg-white rounded-[40px] shadow-2xl p-12" style={{ border: `8px solid ${colorInfo.hex}` }}>

            <div className="flex items-center justify-center gap-3 mb-4">
              <span className="text-3xl" style={{
                background: colorInfo.chipBg, padding: '6px 20px', borderRadius: '999px'
              }}>
                {colorInfo.emoji} {colorInfo.label}
              </span>
              <span className="text-3xl font-bold text-gray-500">
                · {studentName}님 차례
              </span>
            </div>

            <div className="text-7xl font-black text-center mb-10 mt-6 leading-tight">
              {question.question}
            </div>

            <div className={`grid ${cols} gap-5`}>
              {question.displayOptions.map((opt, idx) => {
                const isAnswer = !question.is_open && opt === question.answer;
                const isHighlight = showHint && isAnswer;
                // 선생님 이름 줄바꿈 통일
                const display = opt.endsWith(' 선생님')
                  ? <>{opt.replace(' 선생님', '')}<br/>선생님</>
                  : opt;
                return (
                  <button
                    key={idx}
                    data-no-pop
                    onClick={() => onSelect(opt)}
                    className={`option-btn rounded-3xl py-8 px-3 text-4xl font-black shadow-lg leading-tight ${
                      isHighlight ? 'hint' : ''
                    }`}
                    style={isHighlight ? {} : {
                      background: 'linear-gradient(135deg, #FFFDE7 0%, #FFE0B2 100%)',
                      color: '#5D4037'
                    }}
                  >
                    {display}
                  </button>
                );
              })}
            </div>

            {showHint && (
              <div className="text-center text-4xl mt-8 font-bold text-amber-700 pop-in">
                ✨ 반짝반짝 빛나는 답을 골라볼까요?
              </div>
            )}
          </div>
        </div>
      );
    }

    // ───────────────────────── 듣고 따라하기 화면 ─────────────────────────
    function ListeningScreen({ record, onReplay, onDone }) {
      const [showAnswer, setShowAnswer] = useState(false);

      function handleDone() {
        setShowAnswer(false);
        onDone();
      }

      const student = STUDENTS.find(s => s.name === record.asked_to);
      const level = record.level;
      const info = COLOR_MAP[record.color];

      let instruction, content;
      const showAnswerBtn = level === '가';

      if (level === '가') {
        instruction = '핵심어를 넣어 문장을 완성해 읽어요!';
        const idx = record.sentence.indexOf(record.keyword);
        const before = idx >= 0 ? record.sentence.substring(0, idx) : record.sentence;
        const after = idx >= 0 ? record.sentence.substring(idx + record.keyword.length) : '';

        content = (
          <div className="w-full">
            <div className="text-6xl font-black text-center leading-relaxed mb-6">
              <span>{before}</span>
              <span
                className="inline-block border-4 border-dashed rounded-2xl px-6 py-2 mx-2 align-middle"
                style={{
                  borderColor: showAnswer ? info.deep : '#FFB300',
                  background: showAnswer ? info.hex : '#FFFBE6',
                  minWidth: '180px',
                  minHeight: '70px',
                  fontWeight: 900
                }}
              >
                {showAnswer ? record.keyword : '?'}
              </span>
              <span>{after}</span>
            </div>
            <div className="text-3xl text-center text-gray-600 mt-4">
              💡 핵심어:
              <span
                className="font-black inline-block ml-3 px-5 py-2 rounded-2xl"
                style={{ background: info.hex }}
              >
                {record.keyword}
              </span>
            </div>
          </div>
        );
      } else if (level === '나') {
        instruction = '단어를 듣고 따라 말해요!';
        content = (
          <div>
            <div className="text-2xl text-gray-400 text-center mb-6">{record.sentence}</div>
            <div className="text-center">
              <span className="text-9xl font-black inline-block" style={{
                background: info.hex,
                padding: '12px 36px',
                borderRadius: '32px'
              }}>
                {record.keyword}
              </span>
            </div>
          </div>
        );
      } else {
        instruction = '잘 듣고 박수쳐요!';
        content = (
          <div>
            <div className="text-5xl font-black text-center mb-8 leading-snug">
              {renderSentenceWithHighlight(record.sentence, record.keyword, info.hex)}
            </div>
            <div className="text-9xl text-center" style={{ animation: 'wheel-pulse 1s ease-in-out infinite' }}>
              👏 👏 👏
            </div>
          </div>
        );
      }

      return (
        <div className="w-full max-w-6xl pop-in">
          <div className="bg-white rounded-[40px] shadow-2xl p-12" style={{ border: `8px solid ${info.hex}` }}>
            <div className="flex items-center justify-center gap-3 mb-4">
              <div className="text-6xl">{student?.emoji}</div>
              <div className="text-3xl font-bold">{student?.name}</div>
            </div>
            <div className="text-3xl text-amber-700 font-bold mb-6 text-center">
              🎤 {instruction}
            </div>
            <div className="bg-amber-50 rounded-3xl p-10 mb-8 min-h-[260px] flex items-center justify-center">
              {content}
            </div>
            <div className="flex gap-3 justify-center flex-wrap">
              {showAnswerBtn && (
                <button
                  onClick={() => setShowAnswer(!showAnswer)}
                  className="bg-sky-200 hover:bg-sky-300 text-3xl font-bold px-8 py-5 rounded-2xl shadow-lg hover:scale-105 transition"
                >
                  👁️ {showAnswer ? '문장 가리기' : '문장 보기'}
                </button>
              )}
              <button
                onClick={onReplay}
                className="bg-amber-200 hover:bg-amber-300 text-3xl font-bold px-8 py-5 rounded-2xl shadow-lg hover:scale-105 transition"
              >
                🔊 문장 듣기
              </button>
              <button
                onClick={handleDone}
                className="text-white text-3xl font-bold px-10 py-5 rounded-2xl shadow-lg hover:scale-105 transition"
                style={{ background: 'linear-gradient(135deg, #66BB6A, #43A047)' }}
              >
                ✓ 다음으로
              </button>
            </div>
          </div>
        </div>
      );
    }

    function renderSentenceWithHighlight(sentence, keyword, hexColor) {
      const idx = sentence.indexOf(keyword);
      if (idx === -1) return <span>{sentence}</span>;
      const before = sentence.substring(0, idx);
      const after = sentence.substring(idx + keyword.length);
      return (
        <span>
          {before}
          <span style={{ background: hexColor, padding: '2px 12px', borderRadius: '16px' }}>
            {keyword}
          </span>
          {after}
        </span>
      );
    }

    function CollectedBar({ collected }) {
      return (
        <div className="bg-white/80 backdrop-blur rounded-3xl p-5 shadow-inner min-h-[110px]">
          <div className="text-xl text-gray-500 mb-3 font-bold">
            🎁 모은 핵심어 ({collected.length}/10)
          </div>
          <div className="flex flex-wrap gap-3">
            {collected.map((item, idx) => {
              const info = COLOR_MAP[item.color];
              const text = item.category === '친구'
                ? `${item.target}—${item.keyword}`
                : item.keyword;
              return (
                <div
                  key={idx}
                  className="rounded-full px-5 py-3 text-2xl font-bold shadow pop-in"
                  style={{ background: info.hex, color: '#3A3A3A' }}
                  title={item.sentence}
                >
                  {info.emoji} {text}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ───────────────────────── 완료 화면 ─────────────────────────
    function CompleteScreen({ collected, onGo, onRestart }) {
      useEffect(() => {
        playSuccess();
        const colors = ['#F48FB1', '#FFD54F', '#FFB74D', '#4FC3F7', '#81C784', '#BA68C8'];
        for (let i = 0; i < 50; i++) {
          const el = document.createElement('div');
          el.className = 'confetti';
          el.style.left = Math.random() * 100 + 'vw';
          el.style.background = colors[Math.floor(Math.random() * colors.length)];
          el.style.animationDelay = Math.random() * 2 + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 5500);
        }
        setTimeout(() => {
          speak('와! 핵심어 열 개를 모두 모았어요! 이제 우리 반 테마곡을 만들러 가요!');
        }, 800);
      }, []);

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-8 relative overflow-hidden">
          <div className="text-[180px] mb-2 pop-in">🎉</div>
          <h1 className="font-display text-[120px] leading-none mb-4 pop-in" style={{
            background: 'linear-gradient(135deg, #F48FB1, #FFB74D, #4FC3F7)',
            WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
            animationDelay: '0.2s'
          }}>
            핵심어 10개 완성!
          </h1>
          <h2 className="text-4xl text-gray-600 mb-12 pop-in" style={{ animationDelay: '0.4s' }}>
            이제 우리 반 노래를 만들러 가요 🎵
          </h2>

          <div className="bg-white rounded-[40px] p-10 mb-12 shadow-2xl max-w-6xl pop-in"
               style={{ animationDelay: '0.6s' }}>
            <div className="flex flex-wrap gap-3 justify-center">
              {collected.map((item, idx) => {
                const info = COLOR_MAP[item.color];
                const text = item.category === '친구'
                  ? `${item.target}—${item.keyword}`
                  : item.keyword;
                return (
                  <div
                    key={idx}
                    className="rounded-full px-6 py-4 text-3xl font-bold shadow"
                    style={{ background: info.hex }}
                  >
                    {info.emoji} {text}
                  </div>
                );
              })}
            </div>
          </div>

          <div className="flex gap-6 pop-in" style={{ animationDelay: '0.9s' }}>
            <button
              onClick={onRestart}
              className="bg-white text-gray-700 text-3xl font-bold px-10 py-6 rounded-full shadow-xl hover:scale-105 transition"
            >
              🔄 다시 하기
            </button>
            <button
              onClick={onGo}
              className="text-white text-5xl font-bold px-16 py-8 rounded-full shadow-2xl hover:scale-110 transition-transform"
              style={{ background: 'linear-gradient(135deg, #BA68C8 0%, #F48FB1 100%)' }}
            >
              🎵 테마곡 만들러 가기
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
