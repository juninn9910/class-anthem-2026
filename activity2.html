<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>활동2 · 우리 반 테마곡 만들기</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Hi+Melody&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --pink: #FFCDD2;
      --yellow: #FFF59D;
      --orange: #FFE0B2;
      --skyblue: #B3E5FC;
      --ink: #3A3A3A;
    }
    html, body {
      font-family: 'Gowun Dodum', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 15%, #FFF1E6 0%, transparent 40%),
        radial-gradient(circle at 90% 85%, #E8F5FF 0%, transparent 45%),
        linear-gradient(135deg, #FFFBF2 0%, #FFF5F0 100%);
      min-height: 100vh;
    }
    .font-display { font-family: 'Hi Melody', cursive; }

    @keyframes pop-in {
      0% { transform: scale(0.7) translateY(20px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .pop-in { animation: pop-in 0.55s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .deco-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.3;
      pointer-events: none;
    }

    /* 활동지 인쇄 영역은 화면에서 숨김 */
    #worksheets-print {
      position: absolute;
      left: -9999px;
      top: 0;
      width: 210mm;
      background: white;
    }
    #worksheets-print.show {
      position: static;
      left: auto;
    }

    /* 활동지 공통 */
    .worksheet {
      width: 210mm;
      height: 297mm;
      padding: 12mm 14mm;
      background: white;
      page-break-after: always;
      page-break-inside: avoid;
      font-family: 'Gowun Dodum', sans-serif;
      color: #2C2C2C;
      box-sizing: border-box;
      overflow: hidden;
    }
    .worksheet:last-child { page-break-after: auto; }
    .worksheet:first-child { page-break-before: avoid; }

    .ws-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #FFCDD2;
      padding-bottom: 6mm;
      margin-bottom: 8mm;
    }
    .ws-title {
      font-size: 32pt;
      font-weight: 900;
    }
    .ws-name {
      font-size: 20pt;
      font-weight: 600;
    }

    /* 카테고리 하이라이트 */
    .hl-pink    { background: #FFCDD2; padding: 0 6px; border-radius: 6px; }
    .hl-yellow  { background: #FFF59D; padding: 0 6px; border-radius: 6px; }
    .hl-orange  { background: #FFE0B2; padding: 0 6px; border-radius: 6px; }
    .hl-skyblue { background: #B3E5FC; padding: 0 6px; border-radius: 6px; }

    /* A형 */
    .ws-A .ws-body p {
      font-size: 22pt;
      line-height: 1.4;
      margin: 0 0 3mm 0;
      padding-right: 2cm;
    }
    .ws-A .ws-body .keyword {
      font-weight: 700;
    }
    .ws-bottom-lines {
      margin-top: 6mm;
    }
    .ws-bottom-lines .label {
      font-size: 18pt;
      font-weight: 700;
      margin-bottom: 4mm;
    }
    .ws-bottom-lines .line {
      border-bottom: 2px solid #888;
      height: 10mm;
      margin-bottom: 3mm;
    }

    /* B형 */
    .ws-B .ws-body p {
      font-size: 24pt;
      line-height: 1.5;
      margin: 0 0 4mm 0;
      padding-right: 3cm;
    }
    .ws-B .ws-body .keyword,
    .ws-C .ws-body .keyword {
      font-weight: 900;
      font-size: 1.15em;
    }

    /* C형 매칭 */
    .ws-C .ws-match {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 6mm;
      align-items: stretch;
    }
    .ws-C .ws-match .left p {
      font-size: 18pt;
      line-height: 1.4;
      margin: 0 0 3mm 0;
      padding: 3mm;
      border: 2px dashed #BBB;
      border-radius: 8px;
      min-height: 14mm;
    }
    .ws-C .ws-match .right .cue {
      font-size: 18pt;
      padding: 3mm;
      margin: 0 0 3mm 0;
      border: 2px solid #888;
      border-radius: 12px;
      text-align: center;
      min-height: 14mm;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }
    .ws-C .ws-match .right .cue .cue-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .ws-C .ws-match .right .cue .emoji {
      font-size: 24pt;
    }
    .ws-C .ws-match .right .cue .cue-name {
      font-size: 15pt;
      font-weight: 700;
      color: #D0D0D0;          /* 연한 회색: 신서연이 이름 못 적으니 미리 박아둠 */
      letter-spacing: 1px;
    }

    /* D형 - 친구 4명 카드, 좋아하는 것에 점선 동그라미 */
    .ws-D .ws-d-intro {
      text-align: center;
      font-size: 22pt;
      font-weight: 700;
      color: #5D4037;
      margin: 4mm 0 6mm 0;
      padding: 3mm;
      background: #FFF8E1;
      border-radius: 12px;
    }
    .ws-D .ws-d-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6mm;
    }
    .ws-D .ws-d-card {
      padding: 5mm 4mm;
      background: #FFFAF0;
      border: 3px solid #FFE082;
      border-radius: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4mm;
      min-height: 95mm;
      justify-content: center;
    }
    .ws-D .ws-d-card .friend-row {
      display: flex;
      align-items: center;
      gap: 3mm;
    }
    .ws-D .ws-d-card .friend-emoji {
      font-size: 36pt;
      line-height: 1;
    }
    .ws-D .ws-d-card .friend-name {
      font-size: 30pt;
      font-weight: 900;
      color: #3A3A3A;
    }
    .ws-D .ws-d-card .friend-target-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
    .ws-D .ws-d-card .friend-target {
      font-size: 32pt;
      font-weight: 900;
      padding: 8mm 14mm;
      border: 5px dashed #FF6F00;
      border-radius: 200px;
      background: #FFFFFF;
      color: #3A3A3A;
      text-align: center;
      line-height: 1.1;
    }

    /* 인쇄 미디어 */
    @media print {
      body * { visibility: hidden; }
      #worksheets-print, #worksheets-print * {
        visibility: visible;
        position: static;
        left: auto;
      }
      #worksheets-print {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }
      .worksheet { box-shadow: none; }
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .chip {
      transition: transform 0.2s;
    }
    .chip:hover {
      transform: scale(1.08);
    }

    /* 시식코너 - 재생 중 강한 시각 효과 */
    @keyframes eq-bar {
      0%, 100% { height: 12%; }
      50%      { height: 100%; }
    }
    @keyframes card-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.6), 0 20px 50px rgba(0,0,0,0.18); }
      50%      { box-shadow: 0 0 0 16px rgba(255, 152, 0, 0), 0 20px 50px rgba(0,0,0,0.18); }
    }
    @keyframes wave-rise {
      0% { transform: translateY(0) scale(1); opacity: 0; }
      30% { opacity: 1; }
      100% { transform: translateY(-40px) scale(1.4); opacity: 0; }
    }

    .genre-card-playing {
      animation: card-pulse 1.2s ease-in-out infinite;
      transform: scale(1.06) translateY(-4px);
      border-width: 5px !important;
      filter: saturate(1.3);
    }
    .genre-card-dimmed {
      opacity: 0.32;
      filter: saturate(0.5);
      transform: scale(0.96);
    }
    .eq-row {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 4px;
      height: 38px;
      padding: 4px;
    }
    .eq-row > span {
      display: block;
      width: 6px;
      background: linear-gradient(180deg, #FF6F00 0%, #FFB300 100%);
      border-radius: 3px;
      animation: eq-bar 0.6s ease-in-out infinite;
    }
    .eq-row > span:nth-child(2) { animation-delay: 0.1s; animation-duration: 0.7s; }
    .eq-row > span:nth-child(3) { animation-delay: 0.2s; animation-duration: 0.5s; }
    .eq-row > span:nth-child(4) { animation-delay: 0.05s; animation-duration: 0.8s; }
    .eq-row > span:nth-child(5) { animation-delay: 0.15s; animation-duration: 0.6s; }

    .floating-note {
      position: absolute;
      font-size: 24px;
      animation: wave-rise 1.6s ease-out infinite;
      pointer-events: none;
    }
    .floating-note:nth-child(2) { animation-delay: 0.4s; left: 30%; }
    .floating-note:nth-child(3) { animation-delay: 0.8s; left: 60%; }

    .progress-track {
      height: 6px;
      background: rgba(255,255,255,0.6);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #FF6F00, #FFB300);
      animation: progress-grow 8s linear forwards;
      border-radius: 3px;
    }
    @keyframes progress-grow {
      from { width: 0%; }
      to   { width: 100%; }
    }
  </style>
</head>

      { id: "f6",  color: "pink",    category: "친구",   asked_to: "신서연", target: "박지후", level: "나", keyword: "야구 응원가", sentence: "박지후는 야구 응원가를 좋아해요." },
      { id: "f8",  color: "pink",    category: "친구",   asked_to: "이한수", target: "신서연", level: "다", keyword: "코코몽",      sentence: "신서연은 코코몽을 좋아해요." },
      { id: "t1",  color: "yellow",  category: "선생님", asked_to: "김현민", target: "학급 공통", level: "가", keyword: "이수현 선생님", sentence: "우리 담임 선생님은 이수현 선생님이에요." },
      { id: "t5",  color: "yellow",  category: "선생님", asked_to: "윤승원", target: "학급 공통", level: "가", keyword: "전동휠체어",   sentence: "박정인 선생님은 전동휠체어를 타고 계셔요." },
      { id: "d5",  color: "orange",  category: "일상",   asked_to: "박지후", target: "학급 공통", level: "나", keyword: "양치",       sentence: "밥을 다 먹고 나서는 양치를 해요." },
      { id: "d10", color: "orange",  category: "일상",   asked_to: "신서연", target: "학급 공통", level: "나", keyword: "목요일",     sentence: "오늘은 목요일이에요." },
      { id: "s1",  color: "skyblue", category: "학교",   asked_to: "이한수", target: "학급 공통", level: "다", keyword: "3학년 2반",  sentence: "우리 반은 3학년 2반이에요." },
      { id: "s2",  color: "skyblue", category: "학교",   asked_to: "김현민", target: "학급 공통", level: "가", keyword: "고등학생",   sentence: "우리는 내년에 고등학생이 돼요." }
    ];

    // ───────────────────────── 곡 분위기 시식코너 (장르 프리셋) ─────────────────────────
    const GENRE_PRESETS = {
      children: {
        label: '밝은 동요',
        emoji: '🎈',
        color: '#FFCDD2',
        meta: "[Children's Pop] [Upbeat] [Acoustic Guitar] [Playful] [Korean Lyrics]",
        play() {
          const synth = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: 'triangle' },
            envelope: { attack: 0.01, decay: 0.3, sustain: 0.1, release: 0.4 }
          }).toDestination();
          synth.volume.value = -10;
          const now = Tone.now();
          const mel = [
            ['C4',0],['E4',0.3],['G4',0.6],['C5',0.9],
            ['E5',1.2],['G4',1.5],['C5',1.8],['G4',2.1],
            ['E4',2.4],['C4',2.7],['G3',3.0],
            ['C4',3.6],['E4',3.9],['G4',4.2],['C5',4.5],
            ['G4',4.8],['E4',5.1],['C4',5.4],
            ['G4',6.0],['E4',6.4],['C4',6.8],['C4',7.2]
          ];
          mel.forEach(([n,t]) => synth.triggerAttackRelease(n, '8n', now + t));
          return { dispose: () => setTimeout(() => synth.dispose(), 8500), duration: 8000 };
        }
      },
      kpop: {
        label: '벅찬 가요',
        emoji: '🚀',
        color: '#FFD54F',
        meta: '[K-Pop] [Uplifting] [Synth] [Dance] [Mid-tempo] [Korean Lyrics]',
        play() {
          const chord = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: 'sawtooth' },
            envelope: { attack: 0.02, decay: 0.3, sustain: 0.4, release: 0.4 }
          });
          const filter = new Tone.Filter(1200, 'lowpass').toDestination();
          chord.connect(filter);
          chord.volume.value = -14;
          const arp = new Tone.Synth({
            oscillator: { type: 'square' },
            envelope: { attack: 0.005, decay: 0.05, sustain: 0.05, release: 0.1 }
          }).toDestination();
          arp.volume.value = -18;
          const now = Tone.now();
          // C - G - Am - F 각 2박 (BPM 130 기준)
          const chords = [
            [['C4','E4','G4'], 0],
            [['G3','B3','D4'], 2],
            [['A3','C4','E4'], 4],
            [['F3','A3','C4'], 6]
          ];
          chords.forEach(([c,t]) => chord.triggerAttackRelease(c, '2n', now + t));
          const arpNotes = ['C5','E5','G5','C6','G5','E5','D5','F5','A5','D6','A5','F5','C5','E5','A5','C6','C5','F5','A5','C6'];
          for (let i = 0; i < 32; i++) {
            arp.triggerAttackRelease(arpNotes[i % arpNotes.length], '16n', now + i * 0.25);
          }
          return { dispose: () => setTimeout(() => { chord.dispose(); arp.dispose(); filter.dispose(); }, 8500), duration: 8000 };
        }
      },
      hiphop: {
        label: '힙한 힙합',
        emoji: '🎤',
        color: '#9E9E9E',
        meta: '[Hip-Hop] [Trap] [808 Bass] [Boom Bap] [Korean Lyrics]',
        play() {
          const kick = new Tone.MembraneSynth({
            pitchDecay: 0.05, octaves: 6,
            envelope: { attack: 0.001, decay: 0.4, sustain: 0.01, release: 1.4 }
          }).toDestination();
          kick.volume.value = -3;
          const hat = new Tone.NoiseSynth({
            noise: { type: 'white' },
            envelope: { attack: 0.001, decay: 0.04, sustain: 0 }
          }).toDestination();
          hat.volume.value = -24;
          const bass = new Tone.MonoSynth({
            oscillator: { type: 'sawtooth' },
            filter: { Q: 6, type: 'lowpass', rolloff: -24 },
            envelope: { attack: 0.01, decay: 0.2, sustain: 0.3, release: 0.5 },
            filterEnvelope: { attack: 0.01, decay: 0.1, sustain: 0.3, baseFrequency: 100, octaves: 2 }
          }).toDestination();
          bass.volume.value = -10;
          const now = Tone.now();
          // 4마디 = 8초 (BPM 120 기준 한 마디 2초)
          for (let bar = 0; bar < 4; bar++) {
            const s = now + bar * 2;
            kick.triggerAttackRelease('C2', '8n', s);
            kick.triggerAttackRelease('C2', '8n', s + 1);
            for (let i = 0; i < 8; i++) {
              hat.triggerAttackRelease('16n', s + i * 0.25);
            }
            const bassNotes = ['C1','C1','F1','G1'];
            bass.triggerAttackRelease(bassNotes[bar], '2n', s + 0.5);
          }
          return { dispose: () => setTimeout(() => { kick.dispose(); hat.dispose(); bass.dispose(); }, 8500), duration: 8000 };
        }
      },
      rock: {
        label: '짱짱 밴드',
        emoji: '🎸',
        color: '#FF7043',
        meta: '[Rock] [Band] [Electric Guitar] [Drums] [Energetic] [Korean Lyrics]',
        play() {
          const guitar = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: 'sawtooth' },
            envelope: { attack: 0.01, decay: 0.1, sustain: 0.5, release: 0.2 }
          });
          const dist = new Tone.Distortion(0.6);
          const filter = new Tone.Filter(2200, 'lowpass');
          guitar.chain(dist, filter, Tone.Destination);
          guitar.volume.value = -14;
          const kick = new Tone.MembraneSynth({ pitchDecay: 0.03, octaves: 4 }).toDestination();
          kick.volume.value = -5;
          const snare = new Tone.NoiseSynth({
            noise: { type: 'white' },
            envelope: { attack: 0.001, decay: 0.13, sustain: 0 }
          }).toDestination();
          snare.volume.value = -14;
          const now = Tone.now();
          // E - A - D - G 파워코드, 각 2박 (BPM 140 기준)
          const power = [
            [['E3','B3','E4'], 0],
            [['A3','E4','A4'], 2],
            [['D3','A3','D4'], 4],
            [['G3','D4','G4'], 6]
          ];
          power.forEach(([c,t]) => {
            for (let i = 0; i < 8; i++) {
              guitar.triggerAttackRelease(c, '8n', now + t + i * 0.25);
            }
          });
          for (let bar = 0; bar < 4; bar++) {
            const s = now + bar * 2;
            kick.triggerAttackRelease('C2', '8n', s);
            kick.triggerAttackRelease('C2', '8n', s + 1);
            snare.triggerAttackRelease('16n', s + 0.5);
            snare.triggerAttackRelease('16n', s + 1.5);
          }
          return { dispose: () => setTimeout(() => { guitar.dispose(); kick.dispose(); snare.dispose(); dist.dispose(); filter.dispose(); }, 8500), duration: 8000 };
        }
      }
    };

    // ───────────────────────── Suno 프롬프트 생성 ─────────────────────────
    function buildSunoPrompt(collected, seasonings, selectedGenres) {
      const sorted = (cat) => collected
        .filter(c => c.category === cat)
        .sort((a, b) => {
          const na = parseInt(String(a.id).replace(/\D/g, ''), 10) || 0;
          const nb = parseInt(String(b.id).replace(/\D/g, ''), 10) || 0;
          return na - nb;
        })
        .map(c => c.sentence.replace(/[.!?]+$/, ''));

      const friends = sorted('친구');
      const teachers = sorted('선생님');
      const daily   = sorted('일상');
      const school  = sorted('학교');

      const styleTag = selectedGenres && selectedGenres.length > 0
        ? selectedGenres.map(k => GENRE_PRESETS[k]?.meta).filter(Boolean).join(' ')
        : "[Children's Pop] [Upbeat] [Mid-tempo]";

      const spiceBlock = seasonings.length > 0
        ? `\n\n[우리 반에 대한 추가 정보 — 자연스럽게 녹여서, 전부 억지로 넣지 말 것]\n${seasonings.map(s => '- ' + s).join('\n')}`
        : '';

      const allLines = [...friends, ...teachers, ...daily, ...school]
        .map(s => '- ' + s).join('\n');

      return `[Title: 우리반]
${styleTag} [Acoustic Guitar] [Korean Lyrics] [Warm] [Sing-along]

[이 노래의 정체성 — 가장 중요]
이 곡은 ${CLASS_CONTEXT.school} ${CLASS_CONTEXT.grade} "우리 반"의 테마곡입니다.
주인공은 특정 한 사람도, 특정 한 장소도, 특정 한 물건도 아닙니다.
주인공은 "함께 생활하는 우리 반 전체"라는 정체성과 그 분위기입니다.
- 우리는 경산자인학교에 다니는 중학교 3학년 한 반입니다.
- 우리는 다섯 명의 친구와 선생님들이 함께 지냅니다.
- 우리는 올해 중학교를 졸업하고 내년에 고등학생이 됩니다.
- 매일 함께 등교하고, 수업하고, 밥 먹고, 웃으며 하루를 보냅니다.
이 모든 것이 "우리 반"이라는 하나의 흐름으로 이어지도록 작사하세요.

[작사 규칙]
1. 아래 핵심어들은 "우리 반을 설명하는 재료"입니다. 어느 하나에 노래 전체가 쏠리면 안 됩니다.
   (예: "1층"이나 "전동휠체어" 같은 단어가 곡의 주제가 되어선 안 됩니다. 그저 우리 반을 이루는 작은 조각일 뿐입니다.)
2. 모든 재료를 균형 있게, 따뜻하고 단순한 동요 스타일로 풀어주세요.
3. 후렴(Chorus)은 "우리 반"과 "경산자인학교", "함께", "졸업" 같은 정체성 단어를 중심으로,
   부르기 쉽고 반복되는 형태로 직접 만들어 주세요. (틀에 박힌 한 줄 반복이 아니라, 이 반만의 후렴이면 좋습니다.)
4. 기타 선율(어쿠스틱 기타)이 곡 전체에 따뜻하게 흐르게 해주세요. 우리 반 친구가 기타 소리를 무척 좋아합니다.

[우리 반을 이루는 재료들 — 균형 있게 사용]
${allLines}${spiceBlock}

[구성 제안]
Intro(기타 선율) → Verse(친구들) → Chorus(우리 반) → Verse(선생님·하루) → Chorus(우리 반) → Bridge(졸업·고등학생) → Final Chorus(우리 반, 경산자인학교) → Outro
마지막은 "우리 반"과 학교 이름을 함께 부르며 따뜻하게 마무리해 주세요.

${styleTag} [Acoustic Guitar] [Korean Lyrics] [Title: 우리반]`;
    }

    function pickSeasonings() {
      const count = 2 + Math.floor(Math.random() * 3); // 2~4개
      const shuffled = [...ALL_SEASONINGS].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, count);
    }

    // ───────────────────────── PDF 파일명 ─────────────────────────
    function getFileName() {
      const d = new Date();
      const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      const koreanName = `우리반_테마곡_활동지_${stamp}.pdf`;
      const englishName = `class_anthem_worksheets_${stamp}.pdf`;
      const ua = navigator.userAgent;
      const koreanSafe = /Chrome|Edg|Firefox/.test(ua) && !/Mobile/.test(ua);
      return koreanSafe ? koreanName : englishName;
    }

    // ───────────────────────── App ─────────────────────────
    function App() {
      const [data, setData] = useState(null);
      const [error, setError] = useState(null);
      const [seasonings, setSeasonings] = useState([]);
      const [selectedGenres, setSelectedGenres] = useState([]);
      const [promptText, setPromptText] = useState('');
      const [copied, setCopied] = useState(false);
      const [generating, setGenerating] = useState(false);

      // 진입 검증
      useEffect(() => {
        try {
          const raw = localStorage.getItem('collectedKeywords');
          if (!raw) {
            setError('활동1 결과가 없어요. 게임으로 돌아가서 핵심어를 모아주세요.');
            return;
          }
          const parsed = JSON.parse(raw);
          const required = ['id', 'category', 'keyword', 'sentence', 'target', 'asked_to'];
          const valid = Array.isArray(parsed) && parsed.length === 10
            && parsed.every(item => required.every(f => item[f] !== undefined && item[f] !== null));
          if (!valid) {
            setError('활동1 결과가 완전하지 않아요. 게임을 다시 진행해주세요.');
            return;
          }
          // ID 순 정렬
          parsed.sort((a, b) => a.id - b.id);
          setData(parsed);
        } catch (e) {
          setError('데이터를 읽지 못했어요: ' + e.message);
        }
      }, []);

      // seasonings 또는 data 변경 시 promptText 재빌드
      useEffect(() => {
        if (data) {
          setPromptText(buildSunoPrompt(data, seasonings, selectedGenres));
        }
      }, [data, seasonings, selectedGenres]);

      function toggleSeasoning(s) {
        setSeasonings(prev =>
          prev.includes(s) ? prev.filter(x => x !== s) : [...prev, s]
        );
      }

      function toggleGenre(key) {
        setSelectedGenres(prev =>
          prev.includes(key) ? prev.filter(x => x !== key) : [...prev, key]
        );
      }

      function copyToClipboard() {
        navigator.clipboard.writeText(promptText).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }).catch(() => {
          // fallback
          const ta = document.createElement('textarea');
          ta.value = promptText;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      }

      function downloadPDF() {
        const el = document.getElementById('worksheets-print');
        if (!el) return;
        setGenerating(true);
        el.classList.add('show');
        const fileName = getFileName();
        html2pdf().set({
          margin: 0,
          filename: fileName,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
          pagebreak: { mode: ['css', 'legacy'] }
        }).from(el).save().then(() => {
          el.classList.remove('show');
          setGenerating(false);
        }).catch(err => {
          el.classList.remove('show');
          setGenerating(false);
          alert('PDF 생성 실패: ' + err.message);
        });
      }

      function printNow() {
        window.print();
      }

      function goGame() {
        window.location.href = 'game.html';
      }

      if (error) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-8">
            <div className="text-9xl mb-6">😺</div>
            <h1 className="text-5xl font-bold mb-4 text-gray-700">{error}</h1>
            <p className="text-2xl text-gray-400 mb-8">게임을 안 돌렸다면, 대표 키워드로 활동지를 미리 뽑을 수 있어요.</p>
            <div className="flex gap-5 flex-wrap justify-center">
              <button
                onClick={() => { setError(null); setData(SAMPLE_COLLECTED); }}
                className="bg-sky-400 text-white text-3xl font-bold px-12 py-6 rounded-full shadow-xl hover:scale-105 transition"
              >
                📄 대표 키워드 미리보기
              </button>
              <button
                onClick={goGame}
                className="bg-pink-400 text-white text-3xl font-bold px-12 py-6 rounded-full shadow-xl hover:scale-105 transition"
              >
                🎮 게임으로 돌아가기
              </button>
            </div>
          </div>
        );
      }

      if (!data) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-4xl text-gray-500">불러오는 중...</div>
          </div>
        );
      }

      const isPreview = data === SAMPLE_COLLECTED;

      return (
        <div className="min-h-screen p-8 relative">
          <div className="deco-circle" style={{ background: 'var(--pink)',    width: 350, height: 350, top: '-80px',  left: '-80px' }} />
          <div className="deco-circle" style={{ background: 'var(--yellow)',  width: 300, height: 300, bottom: '-60px', right: '-60px' }} />

          {isPreview && (
            <div className="relative z-10 mb-4 rounded-2xl px-6 py-3 text-center text-xl font-bold text-amber-800 shadow"
              style={{ background: '#FFF3CD', border: '2px dashed #FFB300' }}>
              📄 대표 키워드 미리보기 모드 — 실제 수업에서는 학생들이 모은 핵심어로 채워져요
            </div>
          )}

          {/* 헤더 */}
          <header className="flex justify-between items-center mb-6 relative z-10">
            <div className="font-display text-7xl" style={{
              background: 'linear-gradient(135deg, #BA68C8, #F48FB1, #FFB74D)',
              WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
            }}>
              🎵 우리 반 테마곡 만들기
            </div>
            <button onClick={goGame} className="bg-white/80 hover:bg-white rounded-full px-6 py-3 text-2xl shadow">
              🏠 메뉴로
            </button>
          </header>

          {/* 누적 핵심어 칩 */}
          <KeywordStrip collected={data} />

          {/* 곡 분위기 시식코너 */}
          <GenreSampler selected={selectedGenres} onToggle={toggleGenre} />

          {/* 메인 2열 */}
          <div className="grid grid-cols-2 gap-6 mt-6 relative z-10">
            <SunoBox
              promptText={promptText}
              onChange={setPromptText}
              onCopy={copyToClipboard}
              copied={copied}
              seasoningGroups={SEASONING_GROUPS}
              allSeasonings={ALL_SEASONINGS}
              seasonings={seasonings}
              onToggle={toggleSeasoning}
              onSetSeasonings={setSeasonings}
            />
            <WorksheetPanel
              onPDF={downloadPDF}
              onPrint={printNow}
              generating={generating}
            />
          </div>

          {/* 인쇄용 활동지 (화면 밖) */}
          <PrintArea collected={data} />
        </div>
      );
    }

    // ───────────────────────── 누적 칩 ─────────────────────────
    function KeywordStrip({ collected }) {
      return (
        <div className="bg-white/85 backdrop-blur rounded-3xl p-5 shadow-lg relative z-10 pop-in">
          <div className="text-2xl text-gray-500 mb-3 font-bold">🎁 모은 핵심어 10개</div>
          <div className="flex flex-wrap gap-3">
            {collected.map(item => {
              const info = COLOR_MAP[item.color];
              const text = item.category === '친구'
                ? `${item.target}—${item.keyword}`
                : item.keyword;
              return (
                <div
                  key={item.id}
                  className="chip rounded-full px-5 py-3 text-2xl font-bold shadow"
                  style={{ background: info.hex }}
                  title={item.sentence}
                >
                  {info.emoji} {text}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ───────────────────────── 곡 분위기 시식코너 컴포넌트 ─────────────────────────
    function GenreSampler({ selected, onToggle }) {
      const [playingKey, setPlayingKey] = useState(null);
      const playerRef = useRef(null);

      async function handlePlay(key) {
        if (playingKey) return;
        try { await Tone.start(); } catch (e) {}
        setPlayingKey(key);
        const handle = GENRE_PRESETS[key].play();
        playerRef.current = handle;
        setTimeout(() => {
          setPlayingKey(null);
          handle.dispose();
          playerRef.current = null;
        }, handle.duration + 200);
      }

      const keys = Object.keys(GENRE_PRESETS);

      return (
        <div className="bg-white/90 backdrop-blur rounded-3xl p-6 shadow-lg relative z-10 mt-4 pop-in"
             style={{ border: '3px solid #FFE0B2' }}>
          <div className="flex items-baseline justify-between mb-4 flex-wrap gap-2">
            <div className="text-2xl text-gray-700 font-bold">
              🎵 곡 분위기 시식코너
              <span className="text-base text-gray-400 font-normal ml-2">
                ▶️ 들어보고 + 누르면 곡 스타일에 추가돼요
              </span>
            </div>
            {playingKey && (
              <div className="text-lg text-amber-600 font-bold flex items-center gap-2">
                <span className="eq-row" style={{ height: '20px' }}>
                  <span></span><span></span><span></span>
                </span>
                <span>{GENRE_PRESETS[playingKey].label} 듣는 중</span>
              </div>
            )}
            {!playingKey && selected.length > 0 && (
              <div className="text-sm text-gray-500">선택됨: {selected.length}개</div>
            )}
          </div>

          <div className="grid grid-cols-4 gap-5">
            {keys.map(key => {
              const preset = GENRE_PRESETS[key];
              const isSelected = selected.includes(key);
              const isPlaying = playingKey === key;
              const isOtherPlaying = playingKey && playingKey !== key;
              const cardCls = isPlaying ? 'genre-card-playing'
                            : isOtherPlaying ? 'genre-card-dimmed'
                            : '';
              return (
                <div
                  key={key}
                  className={`relative rounded-3xl p-5 transition-all ${cardCls}`}
                  style={{
                    background: `linear-gradient(135deg, ${preset.color}FF 0%, ${preset.color}AA 100%)`,
                    border: `4px solid ${isSelected ? '#FF6F00' : 'white'}`,
                    minHeight: '220px'
                  }}
                >
                  {/* 재생 중 떠다니는 음표 */}
                  {isPlaying && (
                    <>
                      <span className="floating-note" style={{ left: '15%', top: '60%' }}>♪</span>
                      <span className="floating-note" style={{ left: '50%', top: '70%' }}>♫</span>
                      <span className="floating-note" style={{ left: '75%', top: '65%' }}>♪</span>
                    </>
                  )}

                  <div className="text-center text-6xl mb-1" style={{ filter: 'drop-shadow(0 2px 0 rgba(0,0,0,0.1))' }}>
                    {preset.emoji}
                  </div>
                  <div className="text-center text-2xl font-black mb-3 text-gray-800">
                    {preset.label}
                  </div>

                  {/* 재생 중: 이퀄라이저 + 프로그레스 */}
                  {isPlaying ? (
                    <div className="bg-white/70 rounded-xl p-2 mb-3">
                      <div className="eq-row">
                        <span></span><span></span><span></span><span></span><span></span>
                      </div>
                      <div className="progress-track">
                        <div className="progress-fill" key={key + '-progress'}></div>
                      </div>
                    </div>
                  ) : (
                    <button
                      onClick={() => handlePlay(key)}
                      disabled={isOtherPlaying}
                      className={`w-full text-lg font-bold py-3 rounded-xl shadow-md transition mb-2 ${
                        isOtherPlaying
                          ? 'bg-gray-200 text-gray-400 cursor-not-allowed'
                          : 'bg-white hover:bg-amber-50 hover:scale-105 text-gray-800'
                      }`}
                    >
                      ▶️ 듣기
                    </button>
                  )}

                  <button
                    onClick={() => onToggle(key)}
                    className={`w-full text-lg font-bold py-3 rounded-xl shadow-md transition hover:scale-105 ${
                      isSelected
                        ? 'bg-orange-500 text-white'
                        : 'bg-white/90 hover:bg-white text-gray-800'
                    }`}
                  >
                    {isSelected ? '✓ 추가됨' : '+ 추가'}
                  </button>
                </div>
              );
            })}
          </div>

          <div className="text-xs text-gray-400 mt-3 text-center">
            💡 합성 미리듣기 (진짜 음원 아님, 분위기 비교용) · 한 번에 한 장르씩만 재생됨
          </div>
        </div>
      );
    }

    // ───────────────────────── Suno 박스 ─────────────────────────
    function SunoBox({ promptText, onChange, onCopy, copied, seasoningGroups, allSeasonings, seasonings, onToggle, onSetSeasonings }) {
      const allOn = allSeasonings.length > 0 && allSeasonings.every(s => seasonings.includes(s));

      return (
        <div className="bg-white rounded-3xl p-6 shadow-xl pop-in">
          <div className="flex items-center gap-3 mb-4">
            <div className="text-4xl">🤖</div>
            <div className="text-3xl font-bold">Suno 프롬프트</div>
          </div>
          <textarea
            value={promptText}
            onChange={(e) => onChange(e.target.value)}
            className="w-full h-64 p-5 text-base rounded-2xl border-2 border-purple-200 focus:border-purple-400 outline-none resize-none leading-relaxed"
            style={{ fontFamily: 'Gowun Dodum, sans-serif' }}
          />

          <div className="mt-4 mb-3">
            <div className="flex items-center justify-between mb-2 flex-wrap gap-2">
              <div className="text-xl font-bold">
                🌶️ 양념 고르기
                <span className="text-sm text-gray-500 font-normal ml-1">(탭해서 추가/빼기)</span>
              </div>
              <div className="flex gap-2">
                <button
                  onClick={() => onSetSeasonings(allOn ? [] : [...allSeasonings])}
                  className={`text-sm font-bold px-3 py-1.5 rounded-lg shadow-sm transition hover:scale-105 ${
                    allOn ? 'bg-gray-200 text-gray-600' : 'bg-amber-400 text-white'
                  }`}
                >
                  {allOn ? '✕ 전체 빼기' : '✓ 전체 추가'}
                </button>
                {seasonings.length > 0 && !allOn && (
                  <button
                    onClick={() => onSetSeasonings([])}
                    className="text-sm font-bold px-3 py-1.5 rounded-lg shadow-sm bg-gray-100 text-gray-500 hover:bg-gray-200 transition"
                  >
                    비우기
                  </button>
                )}
              </div>
            </div>

            <div className="max-h-56 overflow-y-auto pr-1 space-y-3">
              {seasoningGroups.map(grp => {
                const groupAllOn = grp.items.every(s => seasonings.includes(s));
                return (
                  <div key={grp.group}>
                    <div className="flex items-center justify-between mb-1.5">
                      <div className="text-base font-bold text-gray-700">{grp.group}</div>
                      <button
                        onClick={() => {
                          if (groupAllOn) {
                            onSetSeasonings(seasonings.filter(s => !grp.items.includes(s)));
                          } else {
                            const merged = [...new Set([...seasonings, ...grp.items])];
                            onSetSeasonings(merged);
                          }
                        }}
                        className={`text-xs font-bold px-2 py-1 rounded-md transition ${
                          groupAllOn ? 'bg-amber-100 text-amber-700' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'
                        }`}
                      >
                        {groupAllOn ? '✓ 전체' : '+ 전체'}
                      </button>
                    </div>
                    <div className="grid grid-cols-1 gap-1.5">
                      {grp.items.map(s => {
                        const on = seasonings.includes(s);
                        return (
                          <button
                            key={s}
                            onClick={() => onToggle(s)}
                            className={`text-left px-3 py-2 rounded-xl text-sm transition leading-snug ${
                              on
                                ? 'bg-amber-300 text-amber-900 shadow-md font-bold'
                                : 'bg-gray-100 text-gray-500 hover:bg-gray-200'
                            }`}
                          >
                            {on ? '✓ ' : '+ '}{s}
                          </button>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>
            <div className="text-xs text-gray-400 mt-2">
              선택된 양념: {seasonings.length} / {allSeasonings.length}개
            </div>
          </div>

          <button
            onClick={onCopy}
            className="w-full text-white text-2xl font-bold py-4 rounded-2xl shadow-lg hover:scale-105 transition"
            style={{ background: copied ? '#66BB6A' : 'linear-gradient(135deg, #BA68C8, #F48FB1)' }}
          >
            {copied ? '✓ 복사됨!' : '📋 복사'}
          </button>
          <div className="text-sm text-gray-500 mt-3 leading-relaxed">
            💡 양념을 고른 다음 텍스트를 수정하세요. Suno에 복사·붙여넣기 하면 우리 반 테마곡이 만들어져요.
          </div>
        </div>
      );
    }

    // ───────────────────────── 활동지 패널 ─────────────────────────
    function WorksheetPanel({ onPDF, onPrint, generating }) {
      const STUDENT_EMOJI = {
        "김현민": "🦊", "박지후": "🐯", "신서연": "🐰", "윤승원": "🐻", "이한수": "🐼"
      };
      const items = [
        { who: ['김현민', '윤승원'], desc: '10문장 · 자율 동그라미' },
        { who: ['박지후'],            desc: '10문장 · 형광 강조' },
        { who: ['신서연'],            desc: '문장↔이미지 연결' },
        { who: ['이한수'],            desc: '5문장 · 큰 글자' }
      ];
      return (
        <div className="bg-white rounded-3xl p-6 shadow-xl pop-in">
          <div className="flex items-center gap-3 mb-4">
            <div className="text-4xl">📝</div>
            <div className="text-3xl font-bold">활동지</div>
          </div>
          <div className="space-y-3 mb-5">
            {items.map((it, i) => (
              <div key={i} className="flex items-center justify-between bg-gradient-to-r from-orange-50 to-pink-50 rounded-2xl p-4">
                <div>
                  <div className="text-2xl font-bold">
                    {it.who.map(n => `${STUDENT_EMOJI[n]} ${n}`).join('  ·  ')}
                  </div>
                  <div className="text-lg text-gray-500 mt-1">{it.desc}</div>
                </div>
                <div className="text-3xl">📄</div>
              </div>
            ))}
          </div>
          <button
            onClick={onPDF}
            disabled={generating}
            className="w-full text-white text-2xl font-bold py-5 rounded-2xl shadow-lg hover:scale-105 transition mb-3 disabled:opacity-60"
            style={{ background: 'linear-gradient(135deg, #66BB6A, #43A047)' }}
          >
            {generating ? '⏳ PDF 생성 중...' : '📥 PDF 다운로드 (5장)'}
          </button>
          <button
            onClick={onPrint}
            className="w-full bg-amber-100 hover:bg-amber-200 text-2xl font-bold py-4 rounded-2xl shadow"
          >
            🖨️ 즉석 인쇄
          </button>
          <div className="text-sm text-gray-500 mt-3 leading-relaxed">
            💡 컬러 인쇄 권장. 사전 인쇄용으로 PDF 저장 후 학교 프린터에서 출력하세요.
          </div>
        </div>
      );
    }

    // ───────────────────────── 활동지 인쇄 영역 ─────────────────────────
    function PrintArea({ collected }) {
      return (
        <div id="worksheets-print">
          <WorksheetA collected={collected} studentName="김현민" />
          <WorksheetA collected={collected} studentName="윤승원" />
          <WorksheetB collected={collected} studentName="박지후" />
          <WorksheetC collected={collected} studentName="신서연" />
          <WorksheetD collected={collected} />
        </div>
      );
    }

    // 공통 헤더
    function WSHeader({ studentName, namePrinted = false }) {
      return (
        <div className="ws-header">
          <div className="ws-title">우리 반 테마곡 핵심어 🎵</div>
          <div className="ws-name">
            이름: {namePrinted ? studentName : <span style={{ borderBottom: '2px solid #888', display: 'inline-block', minWidth: '120px' }}>&nbsp;</span>}
          </div>
        </div>
      );
    }

    // ───── A형: 가 수준 (10문장, 형광 없음, 자율 판단) ─────
    function WorksheetA({ collected, studentName }) {
      return (
        <div className="worksheet ws-A">
          <WSHeader studentName={studentName} />
          <div className="ws-body">
            {collected.map(item => (
              <p key={item.id}>
                {renderSentenceWithKeyword(item, false)}
              </p>
            ))}
          </div>
          <div className="ws-bottom-lines">
            <div className="label">✏️ 내가 찾은 핵심어:</div>
            {[1,2,3].map(i => <div key={i} className="line"></div>)}
          </div>
        </div>
      );
    }

    // ───── B형: 나 수준 (10문장, 카테고리 형광 + 1.15배) ─────
    function WorksheetB({ collected, studentName }) {
      return (
        <div className="worksheet ws-B">
          <WSHeader studentName={studentName} />
          <div className="ws-body">
            {collected.map(item => (
              <p key={item.id}>
                {renderSentenceWithKeyword(item, true)}
              </p>
            ))}
          </div>
          <div className="ws-bottom-lines">
            <div className="label">💛 내가 좋아하는 핵심어 3개:</div>
            {[1,2,3].map(i => <div key={i} className="line"></div>)}
          </div>
        </div>
      );
    }

    // ───── C형: 신서연 매칭 ─────
    function WorksheetC({ collected, studentName }) {
      // 우측 매칭 단서는 무작위 셔플
      const shuffledRight = useMemo(() => {
        return [...collected].sort(() => Math.random() - 0.5);
      }, [collected]);

      return (
        <div className="worksheet ws-C">
          <WSHeader studentName={studentName} />
          <div className="ws-match">
            <div className="left">
              <div style={{ fontSize: '20pt', fontWeight: 700, marginBottom: '6mm' }}>📖 문장</div>
              {collected.map(item => (
                <p key={item.id}>{renderSentenceWithKeyword(item, true)}</p>
              ))}
            </div>
            <div className="right">
              <div style={{ fontSize: '20pt', fontWeight: 700, marginBottom: '6mm' }}>🎯 그림 단서</div>
              {shuffledRight.map(item => {
                const v = KEYWORD_VISUAL[item.keyword] || { emoji: '', label: item.keyword };
                const showName = item.category === '친구' && item.target && item.target !== '학급 공통';
                return (
                  <div key={item.id} className="cue">
                    <div className="cue-row">
                      {v.emoji && <span className="emoji">{v.emoji}</span>}
                      <span>{v.label}</span>
                    </div>
                    {showName && <span className="cue-name">{item.target}</span>}
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{ marginTop: '8mm', fontSize: '18pt', color: '#666', textAlign: 'center' }}>
            ✏️ 같은 짝을 선으로 이어 보아요
          </div>
        </div>
      );
    }

    // ───── D형: 이한수 (5문장만) ─────
    // 친구별 사전 정의 좋아하는 것 (D형용)
    const FRIEND_FAVORITES = {
      "김현민": { thing: "개미",         emoji: "🐜" },
      "윤승원": { thing: "파파독",       emoji: "📺" },
      "박지후": { thing: "야구 응원가", emoji: "⚾" },
      "신서연": { thing: "코코몽",       emoji: "🐵" }
    };

    function WorksheetD({ collected }) {
      const friends = ["김현민", "윤승원", "박지후", "신서연"];
      return (
        <div className="worksheet ws-D">
          <WSHeader studentName="이한수" namePrinted={true} />
          <div className="ws-d-intro">
            ✏️ 친구가 좋아하는 것에 점선을 따라 동그라미를 그려요
          </div>
          <div className="ws-d-grid">
            {friends.map(name => {
              const fav = FRIEND_FAVORITES[name];
              return (
                <div key={name} className="ws-d-card">
                  <div className="friend-row">
                    <div className="friend-emoji">{fav.emoji}</div>
                    <div className="friend-name">{name}</div>
                  </div>
                  <div className="friend-target-wrap">
                    <div className="friend-target">{fav.thing}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ───────────────────────── sentence 렌더링 ─────────────────────────
    function renderSentenceWithKeyword(item, withHighlight) {
      const info = COLOR_MAP[item.color];
      const sentence = item.sentence;
      const keyword = item.keyword;

      // keyword 위치 찾기
      const idx = sentence.indexOf(keyword);
      if (idx === -1) {
        return <span>{sentence}</span>;
      }
      const before = sentence.substring(0, idx);
      const after = sentence.substring(idx + keyword.length);

      const keywordCls = withHighlight
        ? `keyword ${info.className}`
        : `keyword`;

      return (
        <span>
          {before}
          <span className={keywordCls}>{keyword}</span>
          {after}
        </span>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
