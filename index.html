<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 반 테마곡 만들기</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Hi+Melody&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    html, body {
      font-family: 'Gowun Dodum', sans-serif;
      background:
        radial-gradient(circle at 15% 20%, #FFF1E6 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, #E8F5FF 0%, transparent 45%),
        linear-gradient(135deg, #FFFBF2 0%, #FFF5F0 100%);
      min-height: 100vh;
    }
    .font-display { font-family: 'Hi Melody', cursive; }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-15px) rotate(3deg); }
    }
    .float-1 { animation: float 4s ease-in-out infinite; }
    .float-2 { animation: float 5s ease-in-out infinite; animation-delay: 0.5s; }
    .float-3 { animation: float 4.5s ease-in-out infinite; animation-delay: 1s; }
    .deco {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.35;
      pointer-events: none;
    }
    .menu-card {
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .menu-card:hover {
      transform: translateY(-12px) scale(1.04) rotate(-1deg);
      box-shadow: 0 30px 60px rgba(0,0,0,0.18);
    }
  </style>
</head>
<body class="relative overflow-hidden">
  <div class="deco" style="background:#FFCDD2; width:400px; height:400px; top:-100px; left:-100px;"></div>
  <div class="deco" style="background:#FFF59D; width:350px; height:350px; bottom:-80px; right:-80px;"></div>
  <div class="deco" style="background:#B3E5FC; width:300px; height:300px; top:40%; right:5%;"></div>

  <div class="min-h-screen flex flex-col items-center justify-center p-12 relative">
    <div class="text-9xl mb-4 float-1">🎵</div>
    <h1 class="font-display text-9xl mb-3 text-center" style="
      background: linear-gradient(135deg, #F48FB1, #FFB74D, #4FC3F7);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 4px 0 rgba(0,0,0,0.05));
    ">
      우리 반 테마곡 만들기
    </h1>
    <h2 class="text-4xl text-gray-600 mb-16 text-center">
      경산자인학교 중학교 3학년 · 정보통신활용
    </h2>

    <div class="grid grid-cols-2 gap-10 max-w-5xl">
      <a href="game.html" class="menu-card block bg-white rounded-[40px] p-12 shadow-2xl text-center" style="border: 8px solid #FFCDD2;">
        <div class="text-9xl mb-4 float-2">🎡</div>
        <div class="text-5xl font-black mb-3">활동 1</div>
        <div class="text-3xl text-pink-600 font-bold mb-2">핵심어 모으기</div>
        <div class="text-xl text-gray-500">돌림판을 돌려 우리 반 핵심어를 모아봐요</div>
      </a>

      <a href="activity2.html" class="menu-card block bg-white rounded-[40px] p-12 shadow-2xl text-center" style="border: 8px solid #B3E5FC;">
        <div class="text-9xl mb-4 float-3">🎼</div>
        <div class="text-5xl font-black mb-3">활동 2</div>
        <div class="text-3xl text-sky-600 font-bold mb-2">테마곡 만들기</div>
        <div class="text-xl text-gray-500">모은 핵심어로 우리 반 노래를 만들어요</div>
      </a>
    </div>

    <div class="mt-16 text-xl text-gray-400">
      지도교사 박정인 · 2026.06.18
    </div>
  </div>
</body>
</html>
