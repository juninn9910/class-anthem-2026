<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>활동2 · 우리 반 테마곡 만들기</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Hi+Melody&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <style>
    :root {
      --pink: #FFCDD2;
      --yellow: #FFF59D;
      --orange: #FFE0B2;
      --skyblue: #B3E5FC;
      --ink: #3A3A3A;
    }
    html, body {
      font-family: 'Gowun Dodum', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 10% 15%, #FFF1E6 0%, transparent 40%),
        radial-gradient(circle at 90% 85%, #E8F5FF 0%, transparent 45%),
        linear-gradient(135deg, #FFFBF2 0%, #FFF5F0 100%);
      min-height: 100vh;
    }
    .font-display { font-family: 'Hi Melody', cursive; }

    @keyframes pop-in {
      0% { transform: scale(0.7) translateY(20px); opacity: 0; }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .pop-in { animation: pop-in 0.55s cubic-bezier(0.34, 1.56, 0.64, 1); }

    .deco-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.3;
      pointer-events: none;
    }

    /* 활동지 인쇄 영역은 화면에서 숨김 */
    #worksheets-print {
      position: absolute;
      left: -9999px;
      top: 0;
      width: 210mm;
      background: white;
    }
    #worksheets-print.show {
      position: static;
      left: auto;
    }

    /* 활동지 공통 */
    .worksheet {
      width: 210mm;
      min-height: 297mm;
      padding: 18mm 16mm;
      background: white;
      page-break-after: always;
      font-family: 'Gowun Dodum', sans-serif;
      color: #2C2C2C;
      box-sizing: border-box;
    }
    .worksheet:last-child { page-break-after: auto; }

    .ws-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 3px solid #FFCDD2;
      padding-bottom: 12mm;
      margin-bottom: 14mm;
    }
    .ws-title {
      font-size: 40pt;
      font-weight: 900;
    }
    .ws-name {
      font-size: 24pt;
      font-weight: 600;
    }

    /* 카테고리 하이라이트 */
    .hl-pink    { background: #FFCDD2; padding: 0 6px; border-radius: 6px; }
    .hl-yellow  { background: #FFF59D; padding: 0 6px; border-radius: 6px; }
    .hl-orange  { background: #FFE0B2; padding: 0 6px; border-radius: 6px; }
    .hl-skyblue { background: #B3E5FC; padding: 0 6px; border-radius: 6px; }

    /* A형 */
    .ws-A .ws-body p {
      font-size: 28pt;
      line-height: 1.6;
      margin: 0 0 8mm 0;
      padding-right: 2cm;
    }
    .ws-A .ws-body .keyword {
      font-weight: 600;
    }
    .ws-bottom-lines {
      margin-top: 12mm;
    }
    .ws-bottom-lines .label {
      font-size: 22pt;
      font-weight: 700;
      margin-bottom: 6mm;
    }
    .ws-bottom-lines .line {
      border-bottom: 2px solid #888;
      height: 14mm;
      margin-bottom: 4mm;
    }

    /* B형 */
    .ws-B .ws-body p {
      font-size: 32pt;
      line-height: 1.8;
      margin: 0 0 10mm 0;
      padding-right: 3cm;
    }
    .ws-B .ws-body .keyword,
    .ws-C .ws-body .keyword {
      font-weight: 900;
      font-size: 1.15em;
    }

    /* C형 매칭 */
    .ws-C .ws-match {
      display: grid;
      grid-template-columns: 1.4fr 1fr;
      gap: 8mm;
      align-items: stretch;
    }
    .ws-C .ws-match .left p {
      font-size: 24pt;
      line-height: 1.5;
      margin: 0 0 6mm 0;
      padding: 4mm;
      border: 2px dashed #BBB;
      border-radius: 8px;
      min-height: 18mm;
    }
    .ws-C .ws-match .right .cue {
      font-size: 24pt;
      padding: 4mm;
      margin: 0 0 6mm 0;
      border: 2px solid #888;
      border-radius: 12px;
      text-align: center;
      min-height: 18mm;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .ws-C .ws-match .right .cue .emoji {
      font-size: 32pt;
    }

    /* D형 */
    .ws-D .ws-d-item {
      display: flex;
      align-items: center;
      gap: 8mm;
      margin: 0 0 14mm 0;
      padding: 6mm;
      border-radius: 16px;
      background: #FFFAF0;
    }
    .ws-D .ws-d-item .emoji {
      font-size: 60pt;
      width: 5cm;
      height: 5cm;
      display: flex;
      align-items: center;
      justify-content: center;
      background: white;
      border-radius: 16px;
      border: 3px solid #FFE082;
      flex-shrink: 0;
    }
    .ws-D .ws-d-item .sentence {
      font-size: 36pt;
      line-height: 1.4;
      flex: 1;
    }
    .ws-D .ws-d-item .keyword {
      font-size: 60pt;
      font-weight: 900;
      display: inline-block;
      padding: 4mm 6mm;
      border: 4px dashed #FF6F00;
      border-radius: 100px;
      margin: 0 6px;
    }
    .ws-D .ws-d-item .keyword.hl-pink    { background: #FFCDD2; }
    .ws-D .ws-d-item .keyword.hl-yellow  { background: #FFF59D; }
    .ws-D .ws-d-item .keyword.hl-orange  { background: #FFE0B2; }
    .ws-D .ws-d-item .keyword.hl-skyblue { background: #B3E5FC; }
    .ws-D .ws-d-item .arrow {
      font-size: 36pt;
      margin: 0 4px;
    }

    /* 인쇄 미디어 */
    @media print {
      body * { visibility: hidden; }
      #worksheets-print, #worksheets-print * {
        visibility: visible;
        position: static;
        left: auto;
      }
      #worksheets-print {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
      }
      .worksheet { box-shadow: none; }
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .chip {
      transition: transform 0.2s;
    }
    .chip:hover {
      transform: scale(1.08);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo, useRef } = React;

    // ───────────────────────── CLASS_CONTEXT ─────────────────────────
    const CLASS_CONTEXT = {
      school: "경산자인학교",
      grade: "중학교 3학년",
      teachers: [
        { name: "이수현 선생님", roles: ["담임", "과학"] },
        { name: "박정인 선생님", roles: ["부담임", "정보통신활용", "주제선택", "동아리"] }
      ],
      students: [
        { name: "김현민", likes: ["버스", "클레이"], strengths: ["색칠", "만들기"] },
        { name: "박지후", likes: ["야구", "기타", "축구 노래", "마이크"], strengths: ["세탁"] },
        { name: "신서연", likes: ["뽀로로", "동요"], strengths: ["로봇보행 운동"] },
        { name: "윤승원", likes: ["곤", "파파독", "빅박스", "노래"], strengths: ["태블릿"] },
        { name: "이한수", likes: ["간식", "우유", "밥", "춤추기"], strengths: ["심부름"] }
      ],
      classroom_floor: "1층",
      favorite_place: "운동장",
      facilities: ["운동장", "1층 음악실", "2층 컴퓨터실", "2층 세탁실", "3층 체력단련실", "1층 급식실"],
      daily_routine_highlights: [
        "노란 학교버스",
        "아침에 우유 마시기",
        "점심 전 손 씻기",
        "점심 후 양치",
        "쉬는 시간 5분",
        "선생님께 '안녕하세요' 친구에게 '안녕'"
      ],
      shared_memories: [
        { text: "4월 청도 숲체원 현장체험학습", song_friendly: true },
        { text: "예술·체육시간 필라테스",       song_friendly: true },
        { text: "졸업사진 촬영",                 song_friendly: true },
        { text: "지진 대피 훈련",                song_friendly: false },
        { text: "5월 교생 선생님 방문",          song_friendly: true },
        { text: "올해 중학교 졸업 예정",          song_friendly: true }
      ]
    };

    // 양념 풀(자연어 문장 사전 정의) — 학급 단위 사실만
    const SEASONING_POOL = [
      "가장 좋아하는 곳은 운동장이에요.",
      "4월에 청도 숲체원으로 현장체험학습을 다녀왔어요.",
      "예술·체육시간에는 필라테스를 해요.",
      "졸업사진을 함께 찍었어요.",
      "5월에 교생 선생님이 오셨어요.",
      "올해 중학교를 졸업해요.",
      "노란 학교버스를 타고 학교에 와요.",
      "1층 음악실에서 음악 수업을 해요.",
      "2층 컴퓨터실에서 정보 수업을 해요.",
      "3층 체력단련실에서 운동을 해요.",
      "점심을 먹고 양치를 해요.",
      "선생님께 '안녕하세요' 인사해요."
    ];

    // 색깔 매핑
    const COLOR_MAP = {
      pink:    { hex: "#FFCDD2", label: "친구",   emoji: "🩷", className: "hl-pink",    bg: "#FCE4EC" },
      yellow:  { hex: "#FFF59D", label: "선생님", emoji: "💛", className: "hl-yellow",  bg: "#FFFDE7" },
      orange:  { hex: "#FFE0B2", label: "일상",   emoji: "🧡", className: "hl-orange",  bg: "#FFF3E0" },
      skyblue: { hex: "#B3E5FC", label: "학교",   emoji: "🩵", className: "hl-skyblue", bg: "#E1F5FE" }
    };

    // C/D형 매칭 단서 매핑 (모든 가능한 keyword에 대해)
    const KEYWORD_VISUAL = {
      // ID 1 (이한수 잘하는 것)
      "심부름": { emoji: "🤝", label: "심부름" },
      "운동":   { emoji: "🏃", label: "운동" },
      "춤":     { emoji: "💃", label: "춤" },
      "인사":   { emoji: "👋", label: "인사" },
      "노래":   { emoji: "🎤", label: "노래" },
      // ID 2 (윤승원)
      "태블릿": { emoji: "📱", label: "태블릿" },
      // ID 3 (박지후)
      "야구":   { emoji: "⚾", label: "야구" },
      "기타":   { emoji: "🎸", label: "기타" },
      // ID 4 (김현민)
      "버스":   { emoji: "🚌", label: "버스" },
      "클레이": { emoji: "🎨", label: "클레이" },
      "색칠":   { emoji: "🖍️", label: "색칠" },
      "만들기": { emoji: "🛠️", label: "만들기" },
      // ID 5
      "뽀로로": { emoji: "🐧", label: "뽀로로" },
      // ID 6, 7 (선생님 이름들)
      "이수현 선생님": { emoji: "", label: "이수현 선생님" },
      "박정인 선생님": { emoji: "", label: "박정인 선생님" },
      "이정구 선생님": { emoji: "", label: "이정구 선생님" },
      "채지원 선생님": { emoji: "", label: "채지원 선생님" },
      "김지숙 선생님": { emoji: "", label: "김지숙 선생님" },
      "정동진 선생님": { emoji: "", label: "정동진 선생님" },
      "김경신 선생님": { emoji: "", label: "김경신 선생님" },
      "정유희 선생님": { emoji: "", label: "정유희 선생님" },
      // ID 8
      "손 씻기": { emoji: "🧼", label: "손 씻기" },
      "양치":   { emoji: "🪥", label: "양치" },
      "낮잠":   { emoji: "💤", label: "낮잠" },
      // ID 9
      "우유":   { emoji: "🥛", label: "우유" },
      // ID 10
      "1층":    { emoji: "1️⃣🏫", label: "1층" },
      "2층":    { emoji: "2️⃣🏫", label: "2층" },
      "3층":    { emoji: "3️⃣🏫", label: "3층" }
    };

    // ───────────────────────── Suno 프롬프트 생성 ─────────────────────────
    function buildSunoPrompt(collected, seasonings) {
      const sorted = (cat) => collected
        .filter(c => c.category === cat)
        .sort((a, b) => a.id - b.id)
        .map(c => c.sentence);

      const friend  = sorted('친구');
      const teacher = sorted('선생님');
      const daily   = sorted('일상');
      const school  = sorted('학교');

      const header = `${CLASS_CONTEXT.school} ${CLASS_CONTEXT.grade} 우리 반의 테마곡.`;
      const main = [...friend, ...teacher, ...daily, ...school].join(' ');
      const spice = seasonings.join(' ');
      const style = '밝고 경쾌한 한국어 동요, 어쿠스틱 기타와 합창, 중학생 친화 템포.';

      return `${header}\n\n${main}\n\n${spice}\n\n${style}`;
    }

    function pickSeasonings() {
      const count = 2 + Math.floor(Math.random() * 3); // 2~4개
      const shuffled = [...SEASONING_POOL].sort(() => Math.random() - 0.5);
      return shuffled.slice(0, count);
    }

    // ───────────────────────── PDF 파일명 ─────────────────────────
    function getFileName() {
      const d = new Date();
      const stamp = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      const koreanName = `우리반_테마곡_활동지_${stamp}.pdf`;
      const englishName = `class_anthem_worksheets_${stamp}.pdf`;
      const ua = navigator.userAgent;
      const koreanSafe = /Chrome|Edg|Firefox/.test(ua) && !/Mobile/.test(ua);
      return koreanSafe ? koreanName : englishName;
    }

    // ───────────────────────── App ─────────────────────────
    function App() {
      const [data, setData] = useState(null);
      const [error, setError] = useState(null);
      const [seasonings, setSeasonings] = useState([]);
      const [promptText, setPromptText] = useState('');
      const [copied, setCopied] = useState(false);
      const [generating, setGenerating] = useState(false);

      // 진입 검증
      useEffect(() => {
        try {
          const raw = localStorage.getItem('collectedKeywords');
          if (!raw) {
            setError('활동1 결과가 없어요. 게임으로 돌아가서 핵심어를 모아주세요.');
            return;
          }
          const parsed = JSON.parse(raw);
          const required = ['id', 'category', 'keyword', 'sentence', 'target', 'asked_to'];
          const valid = Array.isArray(parsed) && parsed.length === 10
            && parsed.every(item => required.every(f => item[f] !== undefined && item[f] !== null));
          if (!valid) {
            setError('활동1 결과가 완전하지 않아요. 게임을 다시 진행해주세요.');
            return;
          }
          // ID 순 정렬
          parsed.sort((a, b) => a.id - b.id);
          setData(parsed);
          const s = pickSeasonings();
          setSeasonings(s);
          setPromptText(buildSunoPrompt(parsed, s));
        } catch (e) {
          setError('데이터를 읽지 못했어요: ' + e.message);
        }
      }, []);

      function reshakeSeasonings() {
        if (!data) return;
        const s = pickSeasonings();
        setSeasonings(s);
        setPromptText(buildSunoPrompt(data, s));
      }

      function copyToClipboard() {
        navigator.clipboard.writeText(promptText).then(() => {
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        }).catch(() => {
          // fallback
          const ta = document.createElement('textarea');
          ta.value = promptText;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
          setCopied(true);
          setTimeout(() => setCopied(false), 2000);
        });
      }

      function downloadPDF() {
        const el = document.getElementById('worksheets-print');
        if (!el) return;
        setGenerating(true);
        el.classList.add('show');
        const fileName = getFileName();
        html2pdf().set({
          margin: 0,
          filename: fileName,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
          pagebreak: { mode: ['css', 'legacy'] }
        }).from(el).save().then(() => {
          el.classList.remove('show');
          setGenerating(false);
        }).catch(err => {
          el.classList.remove('show');
          setGenerating(false);
          alert('PDF 생성 실패: ' + err.message);
        });
      }

      function printNow() {
        window.print();
      }

      function goGame() {
        window.location.href = 'game.html';
      }

      if (error) {
        return (
          <div className="min-h-screen flex flex-col items-center justify-center p-8">
            <div className="text-9xl mb-6">😺</div>
            <h1 className="text-5xl font-bold mb-4 text-gray-700">{error}</h1>
            <button
              onClick={goGame}
              className="mt-8 bg-pink-400 text-white text-3xl font-bold px-12 py-6 rounded-full shadow-xl hover:scale-105 transition"
            >
              🎮 게임으로 돌아가기
            </button>
          </div>
        );
      }

      if (!data) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-4xl text-gray-500">불러오는 중...</div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-8 relative">
          <div className="deco-circle" style={{ background: 'var(--pink)',    width: 350, height: 350, top: '-80px',  left: '-80px' }} />
          <div className="deco-circle" style={{ background: 'var(--yellow)',  width: 300, height: 300, bottom: '-60px', right: '-60px' }} />

          {/* 헤더 */}
          <header className="flex justify-between items-center mb-6 relative z-10">
            <div className="font-display text-7xl" style={{
              background: 'linear-gradient(135deg, #BA68C8, #F48FB1, #FFB74D)',
              WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
            }}>
              🎵 우리 반 테마곡 만들기
            </div>
            <button onClick={goGame} className="bg-white/80 hover:bg-white rounded-full px-6 py-3 text-2xl shadow">
              🏠 메뉴로
            </button>
          </header>

          {/* 누적 핵심어 칩 */}
          <KeywordStrip collected={data} />

          {/* 메인 2열 */}
          <div className="grid grid-cols-2 gap-6 mt-6 relative z-10">
            <SunoBox
              promptText={promptText}
              onChange={setPromptText}
              onCopy={copyToClipboard}
              onReshake={reshakeSeasonings}
              copied={copied}
            />
            <WorksheetPanel
              onPDF={downloadPDF}
              onPrint={printNow}
              generating={generating}
            />
          </div>

          {/* 인쇄용 활동지 (화면 밖) */}
          <PrintArea collected={data} />
        </div>
      );
    }

    // ───────────────────────── 누적 칩 ─────────────────────────
    function KeywordStrip({ collected }) {
      return (
        <div className="bg-white/85 backdrop-blur rounded-3xl p-5 shadow-lg relative z-10 pop-in">
          <div className="text-2xl text-gray-500 mb-3 font-bold">🎁 모은 핵심어 10개</div>
          <div className="flex flex-wrap gap-3">
            {collected.map(item => {
              const info = COLOR_MAP[item.color];
              const text = item.category === '친구'
                ? `${item.target}—${item.keyword}`
                : item.keyword;
              return (
                <div
                  key={item.id}
                  className="chip rounded-full px-5 py-3 text-2xl font-bold shadow"
                  style={{ background: info.hex }}
                  title={item.sentence}
                >
                  {info.emoji} {text}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ───────────────────────── Suno 박스 ─────────────────────────
    function SunoBox({ promptText, onChange, onCopy, onReshake, copied }) {
      return (
        <div className="bg-white rounded-3xl p-6 shadow-xl pop-in">
          <div className="flex items-center gap-3 mb-4">
            <div className="text-4xl">🤖</div>
            <div className="text-3xl font-bold">Suno 프롬프트</div>
          </div>
          <textarea
            value={promptText}
            onChange={(e) => onChange(e.target.value)}
            className="w-full h-80 p-5 text-xl rounded-2xl border-2 border-purple-200 focus:border-purple-400 outline-none resize-none leading-relaxed"
            style={{ fontFamily: 'Gowun Dodum, sans-serif' }}
          />
          <div className="flex gap-3 mt-4">
            <button
              onClick={onCopy}
              className="flex-1 text-white text-2xl font-bold py-4 rounded-2xl shadow-lg hover:scale-105 transition"
              style={{ background: copied ? '#66BB6A' : 'linear-gradient(135deg, #BA68C8, #F48FB1)' }}
            >
              {copied ? '✓ 복사됨!' : '📋 복사'}
            </button>
            <button
              onClick={onReshake}
              className="px-6 py-4 text-2xl font-bold rounded-2xl bg-amber-100 hover:bg-amber-200 shadow"
            >
              🔄 양념 다시 뽑기
            </button>
          </div>
          <div className="text-sm text-gray-500 mt-3 leading-relaxed">
            💡 Suno에 복사 → 붙여넣기 하면 우리 반 테마곡이 만들어져요.<br/>
            자동 생성된 내용은 텍스트박스에서 직접 수정할 수도 있어요.
          </div>
        </div>
      );
    }

    // ───────────────────────── 활동지 패널 ─────────────────────────
    function WorksheetPanel({ onPDF, onPrint, generating }) {
      const items = [
        { type: 'A', label: 'A형 (가 수준)', who: '김현민, 윤승원', desc: '10문장 · 자율 동그라미' },
        { type: 'B', label: 'B형 (나 수준)', who: '박지후',          desc: '10문장 · 형광 강조' },
        { type: 'C', label: 'C형 (매칭)',     who: '신서연',          desc: '문장↔이미지 연결' },
        { type: 'D', label: 'D형 (다 수준)', who: '이한수',          desc: '5문장 · 큰 글자' }
      ];
      return (
        <div className="bg-white rounded-3xl p-6 shadow-xl pop-in">
          <div className="flex items-center gap-3 mb-4">
            <div className="text-4xl">📝</div>
            <div className="text-3xl font-bold">수준별 활동지</div>
          </div>
          <div className="space-y-3 mb-5">
            {items.map(it => (
              <div key={it.type} className="flex items-center justify-between bg-gradient-to-r from-orange-50 to-pink-50 rounded-2xl p-4">
                <div>
                  <div className="text-2xl font-bold">{it.label}</div>
                  <div className="text-lg text-gray-500">{it.who} · {it.desc}</div>
                </div>
                <div className="text-3xl">📄</div>
              </div>
            ))}
          </div>
          <button
            onClick={onPDF}
            disabled={generating}
            className="w-full text-white text-2xl font-bold py-5 rounded-2xl shadow-lg hover:scale-105 transition mb-3 disabled:opacity-60"
            style={{ background: 'linear-gradient(135deg, #66BB6A, #43A047)' }}
          >
            {generating ? '⏳ PDF 생성 중...' : '📥 PDF 다운로드 (활동지 5장)'}
          </button>
          <button
            onClick={onPrint}
            className="w-full bg-amber-100 hover:bg-amber-200 text-2xl font-bold py-4 rounded-2xl shadow"
          >
            🖨️ 즉석 인쇄
          </button>
          <div className="text-sm text-gray-500 mt-3 leading-relaxed">
            💡 컬러 인쇄 권장. 사전 인쇄용으로 PDF 저장 후 학교 프린터에서 출력하세요.
          </div>
        </div>
      );
    }

    // ───────────────────────── 활동지 인쇄 영역 ─────────────────────────
    function PrintArea({ collected }) {
      return (
        <div id="worksheets-print">
          <WorksheetA collected={collected} studentName="김현민" />
          <WorksheetA collected={collected} studentName="윤승원" />
          <WorksheetB collected={collected} studentName="박지후" />
          <WorksheetC collected={collected} studentName="신서연" />
          <WorksheetD collected={collected} />
        </div>
      );
    }

    // 공통 헤더
    function WSHeader({ studentName, namePrinted = false }) {
      return (
        <div className="ws-header">
          <div className="ws-title">우리 반 테마곡 핵심어 🎵</div>
          <div className="ws-name">
            이름: {namePrinted ? studentName : <span style={{ borderBottom: '2px solid #888', display: 'inline-block', minWidth: '120px' }}>&nbsp;</span>}
          </div>
        </div>
      );
    }

    // ───── A형: 가 수준 (10문장, 형광 없음, 자율 판단) ─────
    function WorksheetA({ collected, studentName }) {
      return (
        <div className="worksheet ws-A">
          <WSHeader studentName={studentName} />
          <div className="ws-body">
            {collected.map(item => (
              <p key={item.id}>
                {renderSentenceWithKeyword(item, false)}
              </p>
            ))}
          </div>
          <div className="ws-bottom-lines">
            <div className="label">✏️ 내가 찾은 핵심어 10개:</div>
            {[1,2,3,4,5].map(i => <div key={i} className="line"></div>)}
          </div>
        </div>
      );
    }

    // ───── B형: 나 수준 (10문장, 카테고리 형광 + 1.15배) ─────
    function WorksheetB({ collected, studentName }) {
      return (
        <div className="worksheet ws-B">
          <WSHeader studentName={studentName} />
          <div className="ws-body">
            {collected.map(item => (
              <p key={item.id}>
                {renderSentenceWithKeyword(item, true)}
              </p>
            ))}
          </div>
          <div className="ws-bottom-lines">
            <div className="label">💛 내가 좋아하는 핵심어 3개:</div>
            {[1,2,3].map(i => <div key={i} className="line"></div>)}
          </div>
        </div>
      );
    }

    // ───── C형: 신서연 매칭 ─────
    function WorksheetC({ collected, studentName }) {
      // 우측 매칭 단서는 무작위 셔플
      const shuffledRight = useMemo(() => {
        return [...collected].sort(() => Math.random() - 0.5);
      }, [collected]);

      return (
        <div className="worksheet ws-C">
          <WSHeader studentName={studentName} />
          <div className="ws-match">
            <div className="left">
              <div style={{ fontSize: '20pt', fontWeight: 700, marginBottom: '6mm' }}>📖 문장</div>
              {collected.map(item => (
                <p key={item.id}>{renderSentenceWithKeyword(item, true)}</p>
              ))}
            </div>
            <div className="right">
              <div style={{ fontSize: '20pt', fontWeight: 700, marginBottom: '6mm' }}>🎯 그림 단서</div>
              {shuffledRight.map(item => {
                const v = KEYWORD_VISUAL[item.keyword] || { emoji: '', label: item.keyword };
                return (
                  <div key={item.id} className="cue">
                    {v.emoji && <span className="emoji">{v.emoji}</span>}
                    <span>{v.label}</span>
                  </div>
                );
              })}
            </div>
          </div>
          <div style={{ marginTop: '8mm', fontSize: '18pt', color: '#666', textAlign: 'center' }}>
            ✏️ 같은 짝을 선으로 이어 보아요
          </div>
        </div>
      );
    }

    // ───── D형: 이한수 (5문장만) ─────
    function WorksheetD({ collected }) {
      const targetIds = [5, 6, 8, 9, 10];
      const items = collected.filter(c => targetIds.includes(c.id));
      return (
        <div className="worksheet ws-D">
          <WSHeader studentName="이한수" namePrinted={true} />
          <div className="ws-body">
            {items.map(item => {
              const info = COLOR_MAP[item.color];
              const v = KEYWORD_VISUAL[item.keyword] || { emoji: '', label: item.keyword };
              return (
                <div key={item.id} className="ws-d-item">
                  <div className="emoji">{v.emoji || '🎵'}</div>
                  <div className="sentence">
                    {renderSentenceForD(item)}
                  </div>
                </div>
              );
            })}
          </div>
          <div style={{ marginTop: '6mm', fontSize: '20pt', color: '#666', textAlign: 'center' }}>
            ✏️ 핵심어에 동그라미를 따라 그려보아요
          </div>
        </div>
      );
    }

    // ───────────────────────── sentence 렌더링 ─────────────────────────
    function renderSentenceWithKeyword(item, withHighlight) {
      const info = COLOR_MAP[item.color];
      const sentence = item.sentence;
      const keyword = item.keyword;

      // keyword 위치 찾기
      const idx = sentence.indexOf(keyword);
      if (idx === -1) {
        return <span>{sentence}</span>;
      }
      const before = sentence.substring(0, idx);
      const after = sentence.substring(idx + keyword.length);

      const keywordCls = withHighlight
        ? `keyword ${info.className}`
        : `keyword`;

      return (
        <span>
          {before}
          <span className={keywordCls}>{keyword}</span>
          {after}
        </span>
      );
    }

    function renderSentenceForD(item) {
      const info = COLOR_MAP[item.color];
      const sentence = item.sentence;
      const keyword = item.keyword;
      const idx = sentence.indexOf(keyword);
      if (idx === -1) return <span>{sentence}</span>;
      const before = sentence.substring(0, idx);
      const after = sentence.substring(idx + keyword.length);
      return (
        <span>
          {before}
          <span className="arrow">➡️</span>
          <span className={`keyword ${info.className}`}>{keyword}</span>
          {after}
        </span>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
