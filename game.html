<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>활동1 · 우리 반 핵심어 모으기</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Hi+Melody&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --pink: #FFCDD2;
      --yellow: #FFF59D;
      --orange: #FFE0B2;
      --skyblue: #B3E5FC;
      --pink-deep: #F48FB1;
      --yellow-deep: #FFD54F;
      --orange-deep: #FFB74D;
      --skyblue-deep: #4FC3F7;
      --ink: #3A3A3A;
    }
    html, body {
      font-family: 'Gowun Dodum', sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 15% 20%, #FFF1E6 0%, transparent 40%),
        radial-gradient(circle at 85% 80%, #E8F5FF 0%, transparent 45%),
        linear-gradient(135deg, #FFFBF2 0%, #FFF5F0 100%);
      min-height: 100vh;
    }
    .font-display { font-family: 'Hi Melody', cursive; }

    /* 색깔 버튼 펄스 */
    @keyframes wheel-pulse {
      0%, 100% { transform: scale(1) rotate(0deg); }
      50% { transform: scale(1.05) rotate(2deg); }
    }
    .wheel-idle { animation: wheel-pulse 3s ease-in-out infinite; }

    /* 정답 힌트 강조 */
    @keyframes hint-glow {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.85), 0 10px 30px rgba(255, 152, 0, 0.4);
        transform: scale(1.18);
      }
      50% {
        box-shadow: 0 0 0 28px rgba(255, 193, 7, 0), 0 10px 30px rgba(255, 152, 0, 0.4);
        transform: scale(1.25);
      }
    }
    .hint {
      animation: hint-glow 1.1s ease-in-out infinite;
      background: linear-gradient(135deg, #FFEB3B 0%, #FFC107 100%) !important;
      font-size: 130% !important;
      font-weight: 900;
      z-index: 10;
      position: relative;
    }

    /* 등장 애니메이션 */
    @keyframes pop-in {
      0% { transform: scale(0.4) translateY(20px); opacity: 0; }
      60% { transform: scale(1.08) translateY(-4px); }
      100% { transform: scale(1) translateY(0); opacity: 1; }
    }
    .pop-in { animation: pop-in 0.55s cubic-bezier(0.34, 1.56, 0.64, 1); }

    @keyframes shake-x {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-14px); }
      40% { transform: translateX(14px); }
      60% { transform: translateX(-10px); }
      80% { transform: translateX(10px); }
    }
    .shake { animation: shake-x 0.5s ease-in-out; }

    @keyframes confetti-fall {
      0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
    .confetti {
      position: fixed;
      top: 0;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      animation: confetti-fall 3.5s linear forwards;
      pointer-events: none;
      z-index: 50;
    }

    /* 색깔 버튼 호버 */
    .color-btn {
      transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }
    .color-btn:not(:disabled):hover {
      transform: translateY(-14px) scale(1.08) rotate(-3deg);
      filter: brightness(1.05);
    }
    .color-btn:disabled { opacity: 0.25; filter: grayscale(0.6); }

    /* 옵션 버튼 호버 */
    .option-btn {
      transition: all 0.25s ease;
    }
    .option-btn:not(:disabled):hover {
      transform: translateY(-6px) scale(1.03);
      box-shadow: 0 18px 36px rgba(0,0,0,0.18);
    }

    /* 학생 카드 차례 강조 */
    .student-active {
      background: linear-gradient(135deg, #FFE082 0%, #FFAB91 100%);
      transform: scale(1.18) translateY(-6px);
      box-shadow: 0 20px 50px rgba(255, 152, 0, 0.4);
    }

    /* 풍선 장식 */
    .deco-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(40px);
      opacity: 0.35;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useMemo, useRef } = React;

    // ───────────────────────── 부록 A: 활동1 문항 데이터 ─────────────────────────
    const QUESTIONS = [
      {
        id: 1, round: 1, color: "pink", category: "친구",

        options_count: 5, question_type: "open",
        question: "이한수가 잘하는 건? 💪",

        sentences: {

          "춤":     { text: "이한수는 춤을 잘 춰요.",   keyword: "춤" },

      {

          "춤":     { text: "윤승원은 춤을 좋아해요.",     keyword: "춤" },

      {

        options_count: 3, question_type: "open",

          "기타": { text: "박지후는 기타를 좋아해요.", keyword: "기타" },
          "노래": { text: "박지후는 노래를 좋아해요.", keyword: "노래" }
        },
        answer: null
      },
      {
        id: 4, round: 1, color: "pink", category: "친구",
        asked_to: "윤승원", target: "김현민", level: "가",
        options_count: 5, question_type: "open",
        question: "김현민이 좋아하는 건? 🚌",
        options: ["버스", "클레이", "색칠", "만들기", "노래"],
        sentences: {
          "버스":   { text: "김현민은 버스를 좋아해요.",   keyword: "버스" },
          "클레이": { text: "김현민은 클레이를 좋아해요.", keyword: "클레이" },
          "색칠":   { text: "김현민은 색칠을 좋아해요.",   keyword: "색칠" },
          "만들기": { text: "김현민은 만들기를 좋아해요.", keyword: "만들기" },
          "노래":   { text: "김현민은 노래를 좋아해요.",   keyword: "노래" }
        },
        answer: null
      },
      {
        id: 5, round: 1, color: "pink", category: "친구",
        asked_to: "이한수", target: "신서연", level: "다",
        options_count: 1, question_type: "fixed",
        question: "신서연이 좋아하는 건? 🐧",
        options: ["뽀로로"],
        sentences: {
          "뽀로로": { text: "신서연은 뽀로로를 좋아해요.", keyword: "뽀로로" }
        },
        answer: "뽀로로"
      },
      {
        id: 6, round: 2, color: "yellow", category: "선생님",
        asked_to: "김현민", target: "학급 공통", level: "가",
        options_count: 5, question_type: "fixed",
        question: "우리 담임은? 👩‍🏫",
        options: ["이수현 선생님", "박정인 선생님", "이정구 선생님", "채지원 선생님", "김지숙 선생님"],
        sentences: {
          "이수현 선생님": { text: "우리 담임은 이수현 선생님이에요.", keyword: "이수현 선생님" },
          "박정인 선생님": { text: "우리 담임은 박정인 선생님이에요.", keyword: "박정인 선생님" },
          "이정구 선생님": { text: "우리 담임은 이정구 선생님이에요.", keyword: "이정구 선생님" },
          "채지원 선생님": { text: "우리 담임은 채지원 선생님이에요.", keyword: "채지원 선생님" },
          "김지숙 선생님": { text: "우리 담임은 김지숙 선생님이에요.", keyword: "김지숙 선생님" }
        },
        answer: "이수현 선생님"
      },
      {
        id: 7, round: 2, color: "yellow", category: "선생님",
        asked_to: "윤승원", target: "학급 공통", level: "가",
        options_count: 5, question_type: "fixed",
        question: "정보 선생님은? 💻",
        options: ["박정인 선생님", "이수현 선생님", "정동진 선생님", "김경신 선생님", "정유희 선생님"],
        sentences: {
          "박정인 선생님": { text: "정보 선생님은 박정인 선생님이에요.", keyword: "박정인 선생님" },
          "이수현 선생님": { text: "정보 선생님은 이수현 선생님이에요.", keyword: "이수현 선생님" },
          "정동진 선생님": { text: "정보 선생님은 정동진 선생님이에요.", keyword: "정동진 선생님" },
          "김경신 선생님": { text: "정보 선생님은 김경신 선생님이에요.", keyword: "김경신 선생님" },
          "정유희 선생님": { text: "정보 선생님은 정유희 선생님이에요.", keyword: "정유희 선생님" }
        },
        answer: "박정인 선생님"
      },
      {
        id: 8, round: 2, color: "orange", category: "일상",
        asked_to: "박지후", target: "학급 공통", level: "나",
        options_count: 3, question_type: "fixed",
        question: "점심 먹기 전에? 🧼",
        options: ["손 씻기", "양치", "낮잠"],
        sentences: {
          "손 씻기": { text: "점심 먹기 전에 손을 씻어요.", keyword: "손 씻기" },
          "양치":   { text: "점심 먹기 전에 양치를 해요.", keyword: "양치" },
          "낮잠":   { text: "점심 먹기 전에 낮잠을 자요.", keyword: "낮잠" }
        },
        answer: "손 씻기"
      },
      {
        id: 9, round: 2, color: "orange", category: "일상",
        asked_to: "이한수", target: "학급 공통", level: "다",
        options_count: 1, question_type: "fixed",
        question: "아침에 마시는 건? 🥛",
        options: ["우유"],
        sentences: {
          "우유": { text: "우리는 아침에 우유를 마셔요.", keyword: "우유" }
        },
        answer: "우유"
      },
      {
        id: 10, round: 2, color: "skyblue", category: "학교",
        asked_to: "신서연", target: "학급 공통", level: "나",
        options_count: 3, question_type: "fixed",
        question: "우리 반은 몇 층? 🏫",
        options: ["1층", "2층", "3층"],
        sentences: {
          "1층": { text: "우리 반은 1층에 있어요.", keyword: "1층" },
          "2층": { text: "우리 반은 2층에 있어요.", keyword: "2층" },
          "3층": { text: "우리 반은 3층에 있어요.", keyword: "3층" }
        },
        answer: "1층"
      }
    ];

    const STUDENTS = [
      { name: "김현민", level: "가", emoji: "🦊" },
      { name: "박지후", level: "나", emoji: "🐯" },
      { name: "신서연", level: "나", emoji: "🐰" },
      { name: "윤승원", level: "가", emoji: "🐻" },
      { name: "이한수", level: "다", emoji: "🐼" }
    ];

    const COLOR_MAP = {
      pink:    { hex: "#FFCDD2", deep: "#F48FB1", label: "친구",   emoji: "🩷", chipBg: "#FCE4EC" },
      yellow:  { hex: "#FFF59D", deep: "#FFD54F", label: "선생님", emoji: "💛", chipBg: "#FFFDE7" },
      orange:  { hex: "#FFE0B2", deep: "#FFB74D", label: "일상",   emoji: "🧡", chipBg: "#FFF3E0" },
      skyblue: { hex: "#B3E5FC", deep: "#4FC3F7", label: "학교",   emoji: "🩵", chipBg: "#E1F5FE" }
    };

    // ───────────────────────── TTS ─────────────────────────
    function speak(text, opts = {}) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = 'ko-KR';
      u.rate = opts.rate ?? 0.9;
      u.pitch = opts.pitch ?? 1.1;
      u.volume = 1;
      window.speechSynthesis.speak(u);
    }

    // ───────────────────────── Root ─────────────────────────
    function App() {
      const [phase, setPhase] = useState('start');
      const [currentId, setCurrentId] = useState(null);
      const [collected, setCollected] = useState([]);
      const [progressedIds, setProgressedIds] = useState([]);
      const [showHint, setShowHint] = useState(false);
      const [wrongShake, setWrongShake] = useState(false);
      const [locked, setLocked] = useState(false);

      const currentQ = useMemo(
        () => QUESTIONS.find(q => q.id === currentId) || null,
        [currentId]
      );

      const remainingByColor = (color) =>
        QUESTIONS
          .filter(q => q.color === color && !progressedIds.includes(q.id))
          .sort((a, b) => a.id - b.id);

      const colorAvailable = (color) => remainingByColor(color).length > 0;

      const turnInfo = useMemo(() => {
        const next = QUESTIONS.find(q => !progressedIds.includes(q.id));
        if (!next) return null;
        const studentQs = QUESTIONS.filter(q => q.asked_to === next.asked_to).sort((a, b) => a.id - b.id);
        const idx = studentQs.findIndex(q => q.id === next.id);
        return {
          name: next.asked_to,
          turn: idx + 1,
          total: studentQs.length,
          color: next.color,
          category: next.category
        };
      }, [progressedIds]);
      const nextStudent = turnInfo?.name || null;

      // 색깔 버튼 클릭
      function handleColorClick(color) {
        if (locked) return;
        const next = remainingByColor(color)[0];
        if (!next) return;
        setCurrentId(next.id);
        setShowHint(false);
        setWrongShake(false);
        // 차례 안내 TTS
        setTimeout(() => speak(`${next.asked_to}. ${COLOR_MAP[color].label} 차례.`), 150);
      }

      // 선택지 클릭
      function handleOptionClick(opt) {
        if (locked || !currentQ) return;
        const data = currentQ.sentences[opt];
        if (!data) return;

        // fixed 오답 처리
        if (currentQ.question_type === 'fixed' && opt !== currentQ.answer) {
          setShowHint(true);
          setWrongShake(true);
          speak('다시 한 번 골라볼까요? 반짝이는 답을 골라보세요.');
          setTimeout(() => setWrongShake(false), 600);
          return;
        }

        // 정답 / open 정상 선택
        setLocked(true);
        speak(data.text);

        const record = {
          id: currentQ.id,
          round: currentQ.round,
          color: currentQ.color,
          category: currentQ.category,
          asked_to: currentQ.asked_to,
          target: currentQ.target,
          level: currentQ.level,
          keyword: data.keyword,
          sentence: data.text
        };

        setTimeout(() => {
          const newCollected = [...collected, record];
          const newProgressed = [...progressedIds, currentQ.id];
          setCollected(newCollected);
          setProgressedIds(newProgressed);
          setCurrentId(null);
          setShowHint(false);
          setLocked(false);

          if (newCollected.length === 10) {
            localStorage.setItem('collectedKeywords', JSON.stringify(newCollected));
            setPhase('complete');
          }
        }, 2400);
      }

      function startGame() {
        setPhase('playing');
        setCollected([]);
        setProgressedIds([]);
        setCurrentId(null);
        setShowHint(false);
      }

      function goActivity2() {
        window.location.href = 'activity2.html';
      }

      function restart() {
        if (!confirm('처음부터 다시 시작할까요? (모은 핵심어가 사라져요)')) return;
        localStorage.removeItem('collectedKeywords');
        startGame();
      }

      if (phase === 'start')    return <StartScreen onStart={startGame} />;
      if (phase === 'complete') return <CompleteScreen collected={collected} onGo={goActivity2} onRestart={restart} />;

      return (
        <PlayingScreen
          collected={collected}
          currentQ={currentQ}
          nextStudent={nextStudent}
          turnInfo={turnInfo}
          colorAvailable={colorAvailable}
          onColorClick={handleColorClick}
          onOptionClick={handleOptionClick}
          showHint={showHint}
          wrongShake={wrongShake}
          locked={locked}
          onRestart={restart}
        />
      );
    }

    // ───────────────────────── 시작 화면 ─────────────────────────
    function StartScreen({ onStart }) {
      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-12 relative overflow-hidden">
          <div className="deco-circle" style={{ background: 'var(--pink)',    width: 400, height: 400, top: '-100px',  left: '-100px' }} />
          <div className="deco-circle" style={{ background: 'var(--yellow)',  width: 350, height: 350, bottom: '-80px', right: '-80px' }} />
          <div className="deco-circle" style={{ background: 'var(--skyblue)', width: 300, height: 300, top: '40%',      right: '5%' }} />

          <h1 className="font-display text-[140px] leading-none mb-2 pop-in" style={{
            background: 'linear-gradient(135deg, #F48FB1 0%, #FFB74D 50%, #4FC3F7 100%)',
            WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
            filter: 'drop-shadow(0 4px 0 rgba(0,0,0,0.05))'
          }}>
            우리 반 테마곡
          </h1>
          <h2 className="text-5xl mb-16 text-gray-600 pop-in" style={{ animationDelay: '0.15s' }}>
            🎵 핵심어 모으기 게임 🎵
          </h2>

          <div className="flex gap-6 mb-20">
            {STUDENTS.map((s, i) => (
              <div
                key={s.name}
                className="bg-white/90 backdrop-blur rounded-3xl p-8 shadow-xl text-center pop-in"
                style={{ animationDelay: `${0.3 + i * 0.1}s` }}
              >
                <div className="text-8xl mb-2">{s.emoji}</div>
                <div className="text-4xl font-bold">{s.name}</div>
              </div>
            ))}
          </div>

          <button
            onClick={onStart}
            className="text-white text-6xl font-bold px-20 py-8 rounded-full shadow-2xl transition-all hover:scale-110 hover:rotate-1 pop-in"
            style={{
              background: 'linear-gradient(135deg, #F48FB1 0%, #FFB74D 100%)',
              animationDelay: '0.9s'
            }}
          >
            시작하기 ✨
          </button>
        </div>
      );
    }

    // ───────────────────────── 플레이 화면 ─────────────────────────
    function PlayingScreen({
      collected, currentQ, nextStudent, turnInfo, colorAvailable,
      onColorClick, onOptionClick, showHint, wrongShake, locked, onRestart
    }) {
      return (
        <div className="min-h-screen flex flex-col p-8">
          {/* 헤더 */}
          <header className="flex justify-between items-center mb-6">
            <div className="font-display text-6xl" style={{
              background: 'linear-gradient(135deg, #F48FB1, #FFB74D)',
              WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent'
            }}>
              🎵 핵심어 모으기
            </div>
            <div className="flex items-center gap-4">
              <div className="bg-white rounded-full px-10 py-4 shadow-xl text-4xl font-bold">
                {collected.length} <span className="text-gray-400">/</span> 10
              </div>
              <button
                onClick={onRestart}
                className="bg-white/80 hover:bg-white rounded-full px-5 py-3 text-xl shadow"
                title="처음부터 다시 시작"
              >
                🔄
              </button>
            </div>
          </header>

          {/* 학생 차례 표시 */}
          <TurnRow currentStudent={nextStudent} active={!currentQ} />

          {/* 메인 영역 */}
          <div className="flex-1 flex items-center justify-center my-6">
            {!currentQ ? (
              <ColorPicker onPick={onColorClick} colorAvailable={colorAvailable} nextStudent={nextStudent} turnInfo={turnInfo} />
            ) : (
              <QuestionCard
                question={currentQ}
                onSelect={onOptionClick}
                showHint={showHint}
                wrongShake={wrongShake}
                locked={locked}
              />
            )}
          </div>

          {/* 누적 핵심어 */}
          <CollectedBar collected={collected} />
        </div>
      );
    }

    function TurnRow({ currentStudent, active }) {
      return (
        <div className="flex justify-center gap-5">
          {STUDENTS.map(s => {
            const isMe = s.name === currentStudent;
            return (
              <div
                key={s.name}
                className={`rounded-3xl px-6 py-4 transition-all duration-300 ${
                  isMe && active ? 'student-active' :
                  isMe ? 'bg-white shadow-lg' :
                  'bg-white/60 opacity-50'
                }`}
              >
                <div className="text-5xl text-center">{s.emoji}</div>
                <div className="text-2xl text-center font-bold mt-1">{s.name}</div>
                {isMe && active && (
                  <div className="text-lg text-center mt-1 font-bold text-amber-700">👈 차례</div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    function ColorPicker({ onPick, colorAvailable, nextStudent, turnInfo }) {
      const nextColor = turnInfo?.color;
      return (
        <div className="flex flex-col items-center">
          <div className="text-6xl mb-4 text-gray-700 font-black">
            🎡 {nextStudent}의 {turnInfo?.turn}번째 차례!
          </div>
          <div className="text-3xl mb-10 text-gray-500">
            <span className="font-bold" style={{ color: COLOR_MAP[nextColor]?.deep }}>
              {COLOR_MAP[nextColor]?.emoji} {COLOR_MAP[nextColor]?.label}
            </span>
            {' '}색깔 돌림판을 돌려요!
          </div>
          <div className="grid grid-cols-2 gap-10">
            {Object.entries(COLOR_MAP).map(([key, info]) => {
              const ok = colorAvailable(key);
              const isNext = key === nextColor;
              return (
                <button
                  key={key}
                  disabled={!ok}
                  onClick={() => onPick(key)}
                  className={`color-btn rounded-full flex flex-col items-center justify-center ${ok && isNext ? 'wheel-idle' : ''}`}
                  style={{
                    background: `radial-gradient(circle at 30% 30%, ${info.hex} 0%, ${info.deep} 100%)`,
                    width: 260, height: 260,
                    border: isNext ? '10px solid #FFB300' : '8px solid white',
                    boxShadow: isNext
                      ? '0 0 0 14px rgba(255, 179, 0, 0.35), 0 20px 40px rgba(0,0,0,0.25)'
                      : '0 10px 25px rgba(0,0,0,0.15)',
                    transform: isNext ? 'scale(1.08)' : 'scale(1)',
                    opacity: ok ? 1 : 0.25,
                    filter: ok ? 'none' : 'grayscale(0.6)'
                  }}
                >
                  <div className="text-7xl mb-2 drop-shadow-md">{info.emoji}</div>
                  <div className="text-4xl font-black text-white drop-shadow-md">{info.label}</div>
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function QuestionCard({ question, onSelect, showHint, wrongShake, locked }) {
      const cols = question.options_count === 1 ? 'grid-cols-1 max-w-md mx-auto'
                 : question.options_count === 3 ? 'grid-cols-3'
                 : 'grid-cols-5';

      const colorInfo = COLOR_MAP[question.color];

      return (
        <div className={`w-full max-w-7xl ${wrongShake ? 'shake' : 'pop-in'}`}>
          <div className="bg-white rounded-[40px] shadow-2xl p-12"
               style={{ border: `8px solid ${colorInfo.hex}` }}>

            <div className="flex items-center justify-center gap-3 mb-4">
              <span className="text-3xl" style={{
                background: colorInfo.chipBg, padding: '6px 20px', borderRadius: '999px'
              }}>
                {colorInfo.emoji} {colorInfo.label}
              </span>
              <span className="text-3xl font-bold text-gray-500">
                · {question.asked_to}님 차례
              </span>
            </div>

            <div className="text-8xl font-black text-center mb-10 mt-6 leading-tight">
              {question.question}
            </div>

            <div className={`grid ${cols} gap-5`}>
              {question.options.map(opt => {
                const isAnswer = question.answer === opt;
                const isHighlight = showHint && isAnswer;
                return (
                  <button
                    key={opt}
                    onClick={() => onSelect(opt)}
                    disabled={locked}
                    className={`option-btn rounded-3xl py-10 px-4 text-5xl font-black shadow-lg disabled:opacity-60 ${
                      isHighlight ? 'hint' : ''
                    }`}
                    style={isHighlight ? {} : {
                      background: 'linear-gradient(135deg, #FFFDE7 0%, #FFE0B2 100%)',
                      color: '#5D4037'
                    }}
                  >
                    {opt}
                  </button>
                );
              })}
            </div>

            {showHint && (
              <div className="text-center text-4xl mt-8 font-bold text-amber-700 pop-in">
                ✨ 반짝반짝 빛나는 답을 골라볼까요?
              </div>
            )}
          </div>
        </div>
      );
    }

    function CollectedBar({ collected }) {
      return (
        <div className="bg-white/80 backdrop-blur rounded-3xl p-5 shadow-inner min-h-[110px]">
          <div className="text-xl text-gray-500 mb-3 font-bold">
            🎁 모은 핵심어 ({collected.length}/10)
          </div>
          <div className="flex flex-wrap gap-3">
            {collected.map(item => {
              const info = COLOR_MAP[item.color];
              const text = item.category === '친구'
                ? `${item.target}—${item.keyword}`
                : item.keyword;
              return (
                <div
                  key={item.id}
                  className="rounded-full px-5 py-3 text-2xl font-bold shadow pop-in"
                  style={{ background: info.hex, color: '#3A3A3A' }}
                  title={item.sentence}
                >
                  {info.emoji} {text}
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // ───────────────────────── 완료 화면 ─────────────────────────
    function CompleteScreen({ collected, onGo, onRestart }) {
      // 색종이
      useEffect(() => {
        const colors = ['#F48FB1', '#FFD54F', '#FFB74D', '#4FC3F7', '#81C784', '#BA68C8'];
        for (let i = 0; i < 50; i++) {
          const el = document.createElement('div');
          el.className = 'confetti';
          el.style.left = Math.random() * 100 + 'vw';
          el.style.background = colors[Math.floor(Math.random() * colors.length)];
          el.style.animationDelay = Math.random() * 2 + 's';
          document.body.appendChild(el);
          setTimeout(() => el.remove(), 5500);
        }
        speak('와! 핵심어 열 개를 모두 모았어요! 이제 우리 반 테마곡을 만들러 가요!');
      }, []);

      return (
        <div className="min-h-screen flex flex-col items-center justify-center p-8 relative overflow-hidden">
          <div className="text-[180px] mb-2 pop-in">🎉</div>
          <h1 className="font-display text-[120px] leading-none mb-4 pop-in" style={{
            background: 'linear-gradient(135deg, #F48FB1, #FFB74D, #4FC3F7)',
            WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
            animationDelay: '0.2s'
          }}>
            핵심어 10개 완성!
          </h1>
          <h2 className="text-4xl text-gray-600 mb-12 pop-in" style={{ animationDelay: '0.4s' }}>
            이제 우리 반 노래를 만들러 가요 🎵
          </h2>

          <div className="bg-white rounded-[40px] p-10 mb-12 shadow-2xl max-w-6xl pop-in"
               style={{ animationDelay: '0.6s' }}>
            <div className="flex flex-wrap gap-3 justify-center">
              {collected.map(item => {
                const info = COLOR_MAP[item.color];
                const text = item.category === '친구'
                  ? `${item.target}—${item.keyword}`
                  : item.keyword;
                return (
                  <div
                    key={item.id}
                    className="rounded-full px-6 py-4 text-3xl font-bold shadow"
                    style={{ background: info.hex }}
                  >
                    {info.emoji} {text}
                  </div>
                );
              })}
            </div>
          </div>

          <div className="flex gap-6 pop-in" style={{ animationDelay: '0.9s' }}>
            <button
              onClick={onRestart}
              className="bg-white text-gray-700 text-3xl font-bold px-10 py-6 rounded-full shadow-xl hover:scale-105 transition"
            >
              🔄 다시 하기
            </button>
            <button
              onClick={onGo}
              className="text-white text-5xl font-bold px-16 py-8 rounded-full shadow-2xl hover:scale-110 transition-transform"
              style={{ background: 'linear-gradient(135deg, #BA68C8 0%, #F48FB1 100%)' }}
            >
              🎵 테마곡 만들러 가기
            </button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
